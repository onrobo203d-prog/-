<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BGM & 跳ねタイマー</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  min-height:100vh;
  padding:env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
}

/* メインエリア */
.main{
  width:100%;
  max-width:900px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* 時計 */
#clock{
  font-size:clamp(48px, 10vw, 100px);
  margin:5vh 0 2vh 0;
  transition:0.3s;
}

.red{ color:red; }

/* 分表示 */
.minute-list h6{
  margin:0;
  line-height:1.2;
  font-size:clamp(12px, 3vw, 18px);
}

/* ボタンエリア */
.controls{
  margin-top:4vh;
  width:100%;
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

button{
  padding:12px 20px;
  font-size:clamp(14px, 3vw, 18px);
  min-width:180px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:active{
  transform:scale(0.96);
}

.btn1{
  background:#2196f3;
  color:white;
}

.btn2{
  background:#4caf50;
  color:white;
}

/* 下部説明 */
.footer{
  font-size:clamp(12px, 2.5vw, 16px);
  margin-bottom:10px;
  opacity:0.8;
}
</style>
</head>
<body>

<div class="main">

<h1 style="font-size:clamp(20px,4vw,32px);">BGM & 跳ねタイマー</h1>

<div id="clock">--:--:--</div>

<div class="minute-list">
  <h6>00、03、06、09、12、15、18、21、24、27</h6>
  <h6>30、33、36、39、42、45、48、51、54、57</h6>
</div>

<div class="controls">
  <button class="btn1" onclick="location.href='yobgm'">
    youtube動画登録
  </button>

  <button class="btn2" onclick="location.href='mp3bgm'">
    MP3登録
  </button>
</div>

</div>

<div class="footer">
跳ねるタイミングで時間表示が赤く表示されます。
</div>

<script>

let redTimeout = null;

function updateClock(){

  const now = new Date();
  const h = String(now.getHours()).padStart(2,"0");
  const m = String(now.getMinutes()).padStart(2,"0");
  const s = String(now.getSeconds()).padStart(2,"0");

  const clock = document.getElementById("clock");
  clock.textContent = `${h}:${m}:${s}`;

  if(now.getMinutes() % 3 === 0 && now.getSeconds() === 0){

    clock.classList.add("red");

    if(redTimeout) clearTimeout(redTimeout);
    redTimeout = setTimeout(()=>{
      clock.classList.remove("red");
    },6000);
  }
}

setInterval(updateClock,1000);
updateClock();

</script>
</body>
</html>
