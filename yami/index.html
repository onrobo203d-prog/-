<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGM & 跳ねタイマー</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

#clock{
  font-size:clamp(40px,8vw,72px);
  margin:30px 0;
  transition:0.3s;
}

.red{ color:red; }

.controls{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

select,button{
  padding:10px;
  font-size:16px;
  min-width:220px;
}
  .minute-list h6{
  margin:0; 
  line-height:1.1; 
}
</style>
</head>
<body>

<h1>BGM & 跳ねタイマー</h1>
<div id="clock">--:--:--</div>

  <div class="minute-list">
  <h6>00、03、06、09、12、15、18、21、24、27</h6>
  <h6>30、33、36、39、42、45、48、51、54、57</h6>
</div>
  
<div class="controls">

</div>

<a class="button" href="gift/">IRIAMギフト耐久支援ツール</a>
<a class="button" href="gacha/">ガチャツール</a>

<h5>跳ねるタイミングで時間表示が赤く表示されます。</h5>

<script>

// =====================
// 時計
// =====================
function updateClock(){

  const now = new Date();
  const h = String(now.getHours()).padStart(2,"0");
  const m = String(now.getMinutes()).padStart(2,"0");
  const s = String(now.getSeconds()).padStart(2,"0");

  const clock = document.getElementById("clock");
  clock.textContent = `${h}:${m}:${s}`;

  if(now.getMinutes() % 3 === 0 && now.getSeconds() === 0){

    clock.classList.add("red");

    if(redTimeout) clearTimeout(redTimeout);
    redTimeout = setTimeout(()=>{
      clock.classList.remove("red");
    },6000);
  }
}

setInterval(updateClock,1000);
updateClock();

</script>
</body>
