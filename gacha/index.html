<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配信用ガチャツール</title>

<style>

body{
font-family:sans-serif;
margin:0;
padding:10px;
background:#f2f2f2;
}

.section{
background:white;
padding:12px;
border-radius:8px;
margin-bottom:10px;
}

h2{
margin:5px 0;
}

textarea{
width:100%;
height:80px;
}

button{
padding:6px 10px;
margin:3px;
}

.log{
background:#111;
color:#0f0;
padding:10px;
font-family:monospace;
white-space:pre-wrap;
}

.stats{
background:#eee;
padding:10px;
white-space:pre-wrap;
}

.collapsible{
cursor:pointer;
font-weight:bold;
margin-bottom:5px;
}

.hidden{
display:none;
}

.mainGrid{
display:block;
}

@media (min-width:900px){
.mainGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}
}

</style>
</head>

<body>

<div class="mainGrid">

<div class="section">

<div class="collapsible" onclick="toggle('gachaSettings')">▼ガチャ設定</div>

<div id="gachaSettings">

最大確率
<input id="maxProb" type="number" value="60">

最小確率
<input id="minProb" type="number" value="0.1">

レア数
<input id="rarityCount" type="number" value="5">

<button onclick="generateRarities()">ガチャ生成</button>

<div id="rarityEditor"></div>

<hr>

<label>
<input type="checkbox" id="pityEnabled"> 天井機能
</label>

天井回数
<input id="pityCount" type="number" value="30">

保証レア
<select id="pityRarity"></select>

<br>

<button onclick="resetRarities()">ガチャ設定リセット</button>

</div>

</div>


<div class="section">

<div class="collapsible" onclick="toggle('itemSettings')">▼景品設定</div>

<div id="itemSettings">

<div id="itemEditors"></div>

<button onclick="resetItems()">景品リセット</button>

</div>

</div>

</div>


<div class="section">

<h2>ガチャ操作</h2>

<select id="playerSelect" onchange="updatePityDisplay()"></select>

<button onclick="addPlayer()">＋追加</button>

<button onclick="resetPlayers()">プレイヤーリセット</button>

<div id="pityDisplay"></div>

<br>

<button onclick="setRoll(1)">1回</button>
<button onclick="setRoll(5)">5回</button>
<button onclick="setRoll(10)">10回</button>

任意
<input id="customRoll" type="number" value="1">

<br><br>

<button onclick="rollGacha()">ガチャを回す</button>

</div>


<div class="section">

<h2>ログ表示</h2>

<select id="logFilter" onchange="renderLogs()">
<option value="all">全員</option>
</select>

<div class="log" id="logOutput"></div>

<button onclick="copyLogs()">ログコピー</button>
<button onclick="resetLogs()">ログリセット</button>

</div>


<div class="section">

<h2>排出統計</h2>

<div class="stats" id="statsOutput"></div>

</div>


<div class="section">

<h2>プレイヤー統計</h2>

<div class="stats" id="playerStatsOutput"></div>

<button onclick="resetStats()">統計リセット</button>

</div>


<div class="section">

<button onclick="exportJSON()">設定保存</button>

<input type="file" id="importFile" onchange="importJSON()">

</div>


<script>

let rarities=[]
let items=[]
let players=[]
let logs=[]
let stats={}
let playerStats={}
let playerCounts={}

function toggle(id){
document.getElementById(id).classList.toggle("hidden")
}

function generateRarities(){

rarities=[]

let max=parseFloat(maxProb.value)
let min=parseFloat(minProb.value)
let count=parseInt(rarityCount.value)

for(let i=0;i<count;i++){

let w=max*Math.pow(min/max,i/(count-1))

rarities.push({
name:"レア"+(i+1),
weight:parseFloat(w.toFixed(2))
})

}

renderRarityEditor()
save()

}

function renderRarityEditor(){

let div=document.getElementById("rarityEditor")
div.innerHTML=""

rarities.forEach((r,i)=>{

div.innerHTML+=`
<div>
<input value="${r.name}" onchange="rarities[${i}].name=this.value;renderItems();renderPitySelect();save()">
weight
<input type="number" value="${r.weight}" onchange="rarities[${i}].weight=parseFloat(this.value);save()">
<button onclick="removeRarity(${i})">削除</button>
</div>
`

})

div.innerHTML+=`<button onclick="addRarity()">レア追加</button>`

renderItems()
renderPitySelect()

}

function addRarity(){
rarities.push({name:"新レア",weight:1})
renderRarityEditor()
}

function removeRarity(i){
rarities.splice(i,1)
renderRarityEditor()
}

function renderItems(){

let div=document.getElementById("itemEditors")
div.innerHTML=""

rarities.forEach(r=>{

let list=items.filter(x=>x.rarity==r.name).map(x=>x.name)

div.innerHTML+=`
<h3>${r.name}</h3>
<textarea onchange="updateItems('${r.name}',this.value)">${list.join("\n")}</textarea>
`

})

}

function updateItems(rarity,text){

items=items.filter(x=>x.rarity!=rarity)

text.split("\n").forEach(t=>{
t=t.trim()
if(t)items.push({rarity:rarity,name:t})
})

save()

}

function renderPitySelect(){

let sel=document.getElementById("pityRarity")
sel.innerHTML=""

rarities.forEach(r=>{

let o=document.createElement("option")
o.value=r.name
o.textContent=r.name
sel.appendChild(o)

})

}

function addPlayer(){

let name=prompt("プレイヤー名")

if(!name)return

players.push(name)
playerCounts[name]=0
playerStats[name]={}

updatePlayerUI()
save()

}

function updatePlayerUI(){

let sel=playerSelect
let logSel=logFilter

sel.innerHTML=""
logSel.innerHTML='<option value="all">全員</option>'

players.forEach(p=>{

sel.innerHTML+=`<option>${p}</option>`
logSel.innerHTML+=`<option>${p}</option>`

})

updatePityDisplay()

}

function updatePityDisplay(){

let player=playerSelect.value

if(!player || !pityEnabled.checked){
pityDisplay.innerText=""
return
}

let count=playerCounts[player]||0
let max=pityCount.value

pityDisplay.innerText=`天井カウント ${count} / ${max}`

}

function setRoll(n){
customRoll.value=n
}

function weightedRandom(list){

let sum=list.reduce((a,b)=>a+b.weight,0)
let r=Math.random()*sum

for(let x of list){
if(r<x.weight)return x
r-=x.weight
}

}

function rollGacha(){

let player=playerSelect.value
let times=parseInt(customRoll.value)

if(!player)return

for(let i=0;i<times;i++){

playerCounts[player]++

let pity=false
let rarity

if(pityEnabled.checked && playerCounts[player]>=pityCount.value){

let idx=rarities.findIndex(r=>r.name==pityRarity.value)
let pool=rarities.slice(idx)

rarity=weightedRandom(pool)

playerCounts[player]=0
pity=true

}else{

rarity=weightedRandom(rarities)

}

let pool=items.filter(x=>x.rarity==rarity.name)
if(pool.length==0)continue

let item=pool[Math.floor(Math.random()*pool.length)]

logs.push({
player,
rarity:rarity.name,
item:item.name,
pity
})

stats[item.name]=(stats[item.name]||0)+1

if(!playerStats[player])playerStats[player]={}
playerStats[player][item.name]=(playerStats[player][item.name]||0)+1

}

renderLogs()
renderStats()
renderPlayerStats()
updatePityDisplay()
save()

}

function renderLogs(){

let filter=logFilter.value

let data=logs.filter(l=>filter=="all"||l.player==filter)

let map={}
let text=""

data.forEach(l=>{

if(l.pity){

text+=`${l.player} ${l.rarity} ${l.item} (天井)\n`

}else{

let key=l.player+"|"+l.rarity+"|"+l.item

map[key]=(map[key]||0)+1

}

})

Object.keys(map).forEach(k=>{

let [p,r,i]=k.split("|")

text+=`${p} ${r} ${i} ×${map[k]}\n`

})

logOutput.textContent=text

}

function renderStats(){

let text=""

Object.keys(stats).forEach(i=>{
text+=`${i} ×${stats[i]}\n`
})

statsOutput.textContent=text

}

function renderPlayerStats(){

let text=""

Object.keys(playerStats).forEach(p=>{

text+=`${p}\n`

Object.keys(playerStats[p]).forEach(i=>{
text+=`${i} ×${playerStats[p][i]}\n`
})

text+="\n"

})

playerStatsOutput.textContent=text

}

function copyLogs(){
navigator.clipboard.writeText(logOutput.textContent)
}

function resetLogs(){

if(confirm("ログをリセットしますか？")){
logs=[]
renderLogs()
save()
}

}

function resetStats(){

if(confirm("統計をリセットしますか？")){
stats={}
playerStats={}
renderStats()
renderPlayerStats()
save()
}

}

function resetPlayers(){

if(confirm("プレイヤーリセット？")){
players=[]
playerCounts={}
playerStats={}
updatePlayerUI()
save()
}

}

function resetItems(){

if(confirm("景品リセット？")){
items=[]
renderItems()
save()
}

}

function resetRarities(){

if(confirm("ガチャ設定リセット？")){
rarities=[]
renderRarityEditor()
save()
}

}

function exportJSON(){

let data={rarities,items,players}

let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="gacha_setting.json"
a.click()

}

function importJSON(){

let file=importFile.files[0]
let reader=new FileReader()

reader.onload=e=>{

let data=JSON.parse(e.target.result)

rarities=data.rarities||[]
items=data.items||[]
players=data.players||[]

renderRarityEditor()
renderItems()
updatePlayerUI()

save()

}

reader.readAsText(file)

}

function save(){

localStorage.setItem("gachaData",JSON.stringify({
rarities,
items,
players,
logs,
stats,
playerStats,
playerCounts
}))

}

function load(){

let data=localStorage.getItem("gachaData")
if(!data)return

data=JSON.parse(data)

rarities=data.rarities||[]
items=data.items||[]
players=data.players||[]
logs=data.logs||[]
stats=data.stats||{}
playerStats=data.playerStats||{}
playerCounts=data.playerCounts||{}

renderRarityEditor()
renderItems()
updatePlayerUI()
renderLogs()
renderStats()
renderPlayerStats()

}

load()

</script>

</body>
</html>
