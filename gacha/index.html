<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ガチャツール</title>

<style>
html,body{margin:0;padding:0;font-family:Arial,sans-serif;background:#fafafa;}
#mainWrapper{padding:15px;}

.section{
  background:#fff;padding:15px;margin-bottom:15px;border-radius:10px;
  box-shadow:0 0 4px rgba(0,0,0,0.1);
  position:relative;
}

input[type="number"],input[type="text"],select{
  width:95%;padding:8px;margin:5px 0;border-radius:5px;
  border:1px solid #aaa;font-size:14px;
  box-sizing:border-box;
}

button{cursor:pointer;border:none;border-radius:6px;}

.add-btn{margin-top:10px;padding:8px 15px;background:#55aaff;color:#fff;}

.gacha-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.gacha-btns button{
  flex:1;min-width:30%;padding:12px;font-size:16px;background:#ffb34d;color:#fff;
}

.copy-btn{margin-top:5px;padding:6px 12px;background:#66cc66;color:#fff;}
.clear-btn{margin-top:10px;padding:10px 15px;background:#ff6666;color:#fff;}
.save-btn{margin-top:10px;padding:10px 15px;background:#6666ff;color:#fff;}

.custom-save-wrap{
  position:absolute;
  top:8px;
  right:8px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.custom-save-wrap button{
  padding:6px 10px;font-size:12px;background:#6666ff;color:#fff;border-radius:6px;
}

.N{color:#00ccff;} .R{color:#0055ff;}
.SR{color:#aa00ff;} .UR{color:#ff55aa;}
.LR{color:#ff0000;}

#logContainer{
  display:flex;
  flex-direction:column;
  gap:15px;
}

#summary,#log{
  background:#f8f8f8;
  padding:10px;
  border-radius:8px;
  max-height:500px;
  overflow:auto;
}

.log-block{margin-bottom:10px;border-bottom:1px solid #ccc;padding-bottom:5px;}
.old-log{display:none;font-size:0.9em;color:#333;}
pre{white-space:pre-wrap;word-break:keep-all;}
</style>
</head>

<body>
<div id="mainWrapper">

<!-- プリセット -->
<div class="section">

<label>
確率プリセット
<button onclick="togglePresetHelp()" style="margin-left:10px;padding:12px 20px;font-size:18px;">
操作説明
</button>
</label>

<select id="presetSelect" onchange="applyPreset()" style="width:100%;padding:10px;font-size:16px;margin-top:10px;"></select>

<div style="display:flex;gap:10px;margin-top:10px;">
<button id="loadCustom1Btn" onclick="loadCustom(1)">カスタム1</button>
<button id="loadCustom2Btn" onclick="loadCustom(2)">カスタム2</button>
</div>

<div id="presetHelp" style="display:none;padding:10px;margin-top:8px;background:#eef;border-radius:6px;">
<h3>使い方</h3>
確率プリセットで確率を切り替えられます。<br>
カスタム保存した内容は「カスタム」から呼び出せます。
</div>

</div>

<!-- 天井 -->
<div class="section">
<label><input type="checkbox" id="ceilingSwitch" onchange="toggleCeiling()"> 天井機能を有効</label>

<div id="ceilingSettings" style="display:none;margin-top:10px;">
天井回数  
<input type="number" id="ceilingCount" value="10">

<br><br>

<select id="ceilingRarity" multiple style="width:95%;height:80px;">
<option value="N" selected>N</option>
<option value="R" selected>R</option>
<option value="SR" selected>SR</option>
<option value="UR" selected>UR</option>
<option value="LR" selected>LR</option>
</select>

</div>
</div>

<!-- カスタム確率 -->
<div class="section">

<label><b>選択中プリセット：</b> <span id="presetName">通常</span></label>

<div class="custom-save-wrap">
<button id="saveCustom1Btn">カスタム保存1</button>
<button id="saveCustom2Btn">カスタム保存2</button>
</div>

<br><br>

N <input id="rateN" type="number" value="40">
R <input id="rateR" type="number" value="30">
SR <input id="rateSR" type="number" value="20">
UR <input id="rateUR" type="number" value="7">
LR <input id="rateLR" type="number" value="3">

</div>

<!-- 景品 -->
<div class="section">
<label>景品登録</label>
<div id="items"></div>
<button class="add-btn" onclick="addItem()">＋ 景品追加</button>
</div>

<!-- プレイヤー -->
<div class="section">

<input id="playerName" type="text" placeholder="名前">
<button class="add-btn" onclick="addPlayer()">追加</button>

<select id="playerSelect"></select>

</div>

<!-- ガチャ -->
<div class="section">

<div class="gacha-btns">
<button onclick="roll(1)">1回</button>
<button onclick="roll(5)">5回</button>
<button onclick="roll(10)">10回</button>
</div>

<input id="customRoll" type="number">
<button style="width:100%;margin-top:10px;" onclick="rollCustom()">この回数</button>

</div>

<!-- ログ -->
<div class="section">

<select id="logFilter" onchange="displayLog()"></select>

<select id="sortOrder" onchange="displayLog()">
<option value="desc">新しい順</option>
<option value="asc">古い順</option>
</select>

<button class="clear-btn" onclick="clearLog()">全ログ削除</button>

<div id="logContainer">
<div id="log"></div>
<div id="summary"></div>
</div>

</div>

</div>

<script>

let presetData = {}

async function loadPresets(){

const res = await fetch("preset.json")
presetData = await res.json()

const select = document.getElementById("presetSelect")
select.innerHTML=""

Object.keys(presetData).forEach(name=>{
const opt=document.createElement("option")
opt.value=name
opt.textContent=name
select.appendChild(opt)
})

applyPreset()

}

function applyPreset(){

const name=document.getElementById("presetSelect").value
const p=presetData[name]
if(!p)return

rateN.value=p.N
rateR.value=p.R
rateSR.value=p.SR
rateUR.value=p.UR
rateLR.value=p.LR

presetName.textContent=name

}

function togglePresetHelp(){
const box=document.getElementById("presetHelp")
box.style.display=(box.style.display==="none")?"block":"none"
}

let players=[]
let logData=[]
let ceilingCounter={}
let customRates1=null
let customRates2=null

addItem()

function addItem(){

const div=document.createElement("div")

div.innerHTML=`
<input type="text" placeholder="景品">
<select>
<option>N</option>
<option>R</option>
<option>SR</option>
<option>UR</option>
<option>LR</option>
</select>
<button onclick="this.parentNode.remove()">×</button>
`

items.appendChild(div)

}

function addPlayer(){

const name=playerName.value.trim()

if(!name||players.includes(name))return

players.push(name)
ceilingCounter[name]=0

updatePlayerUI()

playerName.value=""

}

function updatePlayerUI(){

playerSelect.innerHTML=""
logFilter.innerHTML='<option value="">全員</option>'

players.forEach(p=>{

const o=document.createElement("option")
o.value=p
o.textContent=p
playerSelect.appendChild(o)

const o2=document.createElement("option")
o2.value=p
o2.textContent=p
logFilter.appendChild(o2)

})

}

function toggleCeiling(){
ceilingSettings.style.display=ceilingSwitch.checked?"block":"none"
}

function randomChoice(keys,weights){
const sum=weights.reduce((a,b)=>a+b,0)
let r=Math.random()*sum
for(let i=0;i<keys.length;i++){
if(r<weights[i])return keys[i]
r-=weights[i]
}
}

loadPresets()

</script>
</body>
</html>
