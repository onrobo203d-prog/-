<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>パネル開放ツール 完全版+</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#f0f0f0;
    font-family:sans-serif;
}

.wrapper{
    padding:20px;
    max-width:1200px;
    margin:auto;
}

.toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:15px;
    align-items:center;
}

button{
    border:none;
    background:black;
    color:white;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.8;
}

canvas{
    border:2px solid black;
    background:white;
    width:100%;
    height:auto;
    touch-action:none;
}

.info{
    margin-top:10px;
}

.layerEditor{
    margin-top:20px;
    background:white;
    padding:15px;
    border-radius:12px;
}

#layerPanel{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.layerItem{
    border:1px solid #ccc;
    padding:12px;
    border-radius:10px;
    background:#fafafa;
}

.layerHeader{
    display:flex;
    gap:10px;
    align-items:center;
}

.layerThumb{
    width:70px;
    height:70px;
    border:1px solid #ccc;
    object-fit:contain;
    background:white;
}

.layerItem h3{
    margin:0;
    font-size:16px;
}

.layerItem input[type="text"]{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    font-size:16px;
}

.layerItem label{
    display:block;
    margin-top:10px;
}

@media(max-width:768px){

    .toolbar{
        flex-direction:column;
        align-items:stretch;
    }

    button{
        width:100%;
    }
}

</style>
</head>
<body>

<div class="wrapper">

<h1>パネル開放ツール 完全版+</h1>

<div class="toolbar">

<div>
線画PNG
<input type="file" id="lineUpload" accept="image/png">
</div>

<div>
元画像
<input type="file" id="baseUpload" accept="image/*">
</div>

<label>
パネル色
<input type="color" id="panelColor" value="#ff0000">
</label>

<button id="generateBtn">
パネル生成
</button>

<button id="saveBtn">
保存
</button>

</div>

<canvas id="canvas"></canvas>

<div class="info" id="info">
画像未読み込み
</div>

<div class="layerEditor">

<h2>レイヤー編集</h2>

<div id="layerPanel"></div>

</div>

</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const lineUpload = document.getElementById("lineUpload");
const baseUpload = document.getElementById("baseUpload");

const generateBtn = document.getElementById("generateBtn");
const saveBtn = document.getElementById("saveBtn");

const panelColor = document.getElementById("panelColor");

const layerPanel = document.getElementById("layerPanel");
const info = document.getElementById("info");

let lineImage = null;
let baseImage = null;

let regions = [];
let hitMap = null;

let draggingText = null;
let dragOffsetX = 0;
let dragOffsetY = 0;

lineUpload.addEventListener("change", e => {

    const file = e.target.files[0];
    if(!file) return;

    const img = new Image();

    img.onload = () => {

        lineImage = img;
        setupCanvas();

    };

    img.src = URL.createObjectURL(file);
});

baseUpload.addEventListener("change", e => {

    const file = e.target.files[0];
    if(!file) return;

    const img = new Image();

    img.onload = () => {

        baseImage = img;
        setupCanvas();

    };

    img.src = URL.createObjectURL(file);
});

function setupCanvas(){

    const ref = lineImage || baseImage;

    if(!ref) return;

    canvas.width = ref.width;
    canvas.height = ref.height;

    renderAll();
}

generateBtn.addEventListener("click", processPanels);

saveBtn.addEventListener("click", saveImage);

panelColor.addEventListener("input", renderAll);

function processPanels(){

    if(!lineImage){

        alert("線画PNGをアップロードしてください");
        return;
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(lineImage,0,0);

    const imageData = ctx.getImageData(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const binary = createBinaryMap(imageData);

    regions = detectRegions(binary);

    buildLayerUI();

    renderAll();

    info.innerHTML =
        "パネル数 : " + regions.length;
}

function createBinaryMap(imageData){

    const width = imageData.width;
    const height = imageData.height;

    const map = new Uint8Array(width * height);

    for(let i=0;i<width*height;i++){

        const alpha = imageData.data[i*4+3];

        map[i] = alpha > 10 ? 1 : 0;
    }

    for(let x=0;x<width;x++){

        map[x] = 1;
        map[(height-1)*width+x] = 1;
    }

    for(let y=0;y<height;y++){

        map[y*width] = 1;
        map[y*width + width -1] = 1;
    }

    return {
        data:map,
        width,
        height
    };
}

function detectRegions(binary){

    const data = binary.data;
    const width = binary.width;
    const height = binary.height;

    const visited = new Uint8Array(width * height);

    hitMap = new Uint16Array(width * height);

    const found = [];

    let regionId = 0;

    for(let y=0;y<height;y++){

        for(let x=0;x<width;x++){

            const idx = y*width+x;

            if(data[idx]===0 && !visited[idx]){

                const regionPixels =
                    floodFill(
                        x,
                        y,
                        data,
                        visited,
                        width,
                        height
                    );

                if(regionPixels.length > 300){

                    let minX = Infinity;
                    let maxX = -Infinity;
                    let minY = Infinity;
                    let maxY = -Infinity;

                    for(const p of regionPixels){

                        if(p.x < minX) minX = p.x;
                        if(p.x > maxX) maxX = p.x;
                        if(p.y < minY) minY = p.y;
                        if(p.y > maxY) maxY = p.y;

                        hitMap[p.y*width+p.x] =
                            regionId + 1;
                    }

                    const maskCanvas =
                        document.createElement("canvas");

                    maskCanvas.width = width;
                    maskCanvas.height = height;

                    const mctx =
                        maskCanvas.getContext("2d");

                    mctx.fillStyle =
                        "#ffffff";

                    for(const p of regionPixels){

                        mctx.fillRect(
                            p.x,
                            p.y,
                            1,
                            1
                        );
                    }

                    const thumb =
                        createThumbnail(
                            minX,
                            minY,
                            maxX,
                            maxY
                        );

                    found.push({

                        id:regionId,

                        visible:true,

                        pixels:regionPixels,

                        maskCanvas,

                        thumbnail:thumb,

                        text:"",

                        textColor:"#ffffff",

                        fontSize:48,

                        centerX:(minX+maxX)/2,

                        centerY:(minY+maxY)/2,

                        textX:(minX+maxX)/2,

                        textY:(minY+maxY)/2,

                        minX,
                        minY,
                        maxX,
                        maxY
                    });

                    regionId++;
                }
            }
        }
    }

    return found;
}

function createThumbnail(
    minX,
    minY,
    maxX,
    maxY
){

    const size = 70;

    const c =
        document.createElement("canvas");

    c.width = size;
    c.height = size;

    const tctx =
        c.getContext("2d");

    tctx.fillStyle = "#fff";

    tctx.fillRect(0,0,size,size);

    const w = maxX-minX;
    const h = maxY-minY;

    const scale =
        Math.min(size/w,size/h);

    tctx.drawImage(
        lineImage,
        minX,
        minY,
        w,
        h,
        0,
        0,
        w*scale,
        h*scale
    );

    return c.toDataURL();
}

function floodFill(
    startX,
    startY,
    data,
    visited,
    width,
    height
){

    const stack = [[startX,startY]];
    const pixels = [];

    while(stack.length){

        const [x,y] = stack.pop();

        if(
            x<0 ||
            y<0 ||
            x>=width ||
            y>=height
        ){
            continue;
        }

        const idx = y*width+x;

        if(visited[idx]) continue;

        visited[idx] = 1;

        if(data[idx]===1) continue;

        pixels.push({x,y});

        stack.push([x+1,y]);
        stack.push([x-1,y]);
        stack.push([x,y+1]);
        stack.push([x,y-1]);
    }

    return pixels;
}

function renderAll(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    if(baseImage){

        ctx.drawImage(
            baseImage,
            0,
            0,
            canvas.width,
            canvas.height
        );
    }

    for(const region of regions){

        if(!region.visible) continue;

        ctx.save();

        ctx.drawImage(
            region.maskCanvas,
            0,
            0
        );

        ctx.globalCompositeOperation =
            "source-in";

        ctx.fillStyle =
            panelColor.value;

        ctx.fillRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        ctx.restore();

        ctx.save();

        ctx.drawImage(
            region.maskCanvas,
            0,
            0
        );

        ctx.globalCompositeOperation =
            "destination-in";

        ctx.font =
            `${region.fontSize}px sans-serif`;

        ctx.fillStyle =
            region.textColor;

        ctx.textAlign =
            "center";

        ctx.textBaseline =
            "middle";

        ctx.fillText(
            region.text,
            region.textX,
            region.textY
        );

        ctx.restore();
    }

    if(lineImage){

        ctx.drawImage(
            lineImage,
            0,
            0
        );
    }
}

function buildLayerUI(){

    layerPanel.innerHTML = "";

    for(const region of regions){

        const div =
            document.createElement("div");

        div.className =
            "layerItem";

        const header =
            document.createElement("div");

        header.className =
            "layerHeader";

        const thumb =
            document.createElement("img");

        thumb.src =
            region.thumbnail;

        thumb.className =
            "layerThumb";

        header.appendChild(thumb);

        const title =
            document.createElement("h3");

        title.textContent =
            "パネル " + region.id;

        header.appendChild(title);

        div.appendChild(header);

        const toggle =
            document.createElement("button");

        toggle.textContent =
            region.visible
            ? "表示中"
            : "非表示";

        toggle.addEventListener("click",()=>{

            region.visible =
                !region.visible;

            toggle.textContent =
                region.visible
                ? "表示中"
                : "非表示";

            renderAll();
        });

        div.appendChild(toggle);

        const textLabel =
            document.createElement("label");

        textLabel.textContent =
            "文字";

        div.appendChild(textLabel);

        const textInput =
            document.createElement("input");

        textInput.type = "text";

        textInput.value =
            region.text;

        textInput.addEventListener("input",e=>{

            region.text =
                e.target.value;

            renderAll();
        });

        div.appendChild(textInput);

        const colorLabel =
            document.createElement("label");

        colorLabel.textContent =
            "文字色";

        div.appendChild(colorLabel);

        const colorInput =
            document.createElement("input");

        colorInput.type = "color";

        colorInput.value =
            region.textColor;

        colorInput.addEventListener("input",e=>{

            region.textColor =
                e.target.value;

            renderAll();
        });

        div.appendChild(colorInput);

        const sizeLabel =
            document.createElement("label");

        sizeLabel.textContent =
            "文字サイズ";

        div.appendChild(sizeLabel);

        const sizeInput =
            document.createElement("input");

        sizeInput.type = "range";

        sizeInput.min = 12;
        sizeInput.max = 200;

        sizeInput.value =
            region.fontSize;

        sizeInput.addEventListener("input",e=>{

            region.fontSize =
                Number(e.target.value);

            renderAll();
        });

        div.appendChild(sizeInput);

        const dragInfo =
            document.createElement("div");

        dragInfo.style.marginTop =
            "10px";

        dragInfo.innerHTML =
            "※ キャンバス上で文字をドラッグ移動";

        div.appendChild(dragInfo);

        layerPanel.appendChild(div);
    }
}

function getMousePos(e){

    const rect =
        canvas.getBoundingClientRect();

    const scaleX =
        canvas.width / rect.width;

    const scaleY =
        canvas.height / rect.height;

    return {

        x:(e.clientX-rect.left)*scaleX,
        y:(e.clientY-rect.top)*scaleY
    };
}

canvas.addEventListener("pointerdown",e=>{

    const pos = getMousePos(e);

    for(let i=regions.length-1;i>=0;i--){

        const region = regions[i];

        ctx.font =
            `${region.fontSize}px sans-serif`;

        const width =
            ctx.measureText(region.text).width;

        const height =
            region.fontSize;

        if(
            pos.x >
            region.textX - width/2 &&
            pos.x <
            region.textX + width/2 &&
            pos.y >
            region.textY - height/2 &&
            pos.y <
            region.textY + height/2
        ){

            draggingText = region;

            dragOffsetX =
                pos.x - region.textX;

            dragOffsetY =
                pos.y - region.textY;

            return;
        }
    }

    const x = Math.floor(pos.x);
    const y = Math.floor(pos.y);

    const id =
        hitMap[y*canvas.width+x]-1;

    if(id>=0){

        regions[id].visible =
            !regions[id].visible;

        updateLayerButtons();

        renderAll();
    }
});

canvas.addEventListener("pointermove",e=>{

    if(!draggingText) return;

    const pos =
        getMousePos(e);

    draggingText.textX =
        pos.x - dragOffsetX;

    draggingText.textY =
        pos.y - dragOffsetY;

    renderAll();
});

canvas.addEventListener("pointerup",()=>{

    draggingText = null;
});

canvas.addEventListener("pointerleave",()=>{

    draggingText = null;
});

function updateLayerButtons(){

    const buttons =
        layerPanel.querySelectorAll("button");

    regions.forEach((region,index)=>{

        buttons[index].textContent =
            region.visible
            ? "表示中"
            : "非表示";
    });
}

function saveImage(){

    const a =
        document.createElement("a");

    a.href =
        canvas.toDataURL("image/png");

    a.download =
        "panel.png";

    a.click();
}

</script>

</body>
</html>
