<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Player</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #111;
  color: white;
  padding: 20px;
}

select, button, input {
  margin: 8px;
  padding: 8px;
  font-size: 16px;
}

button {
  background: #444;
  color: white;
  border: none;
  border-radius: 6px;
}

.volume-box {
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>Voice Gacha</h2>

<select id="characterSelect"></select>
<button id="playVoice">🎤 セリフ再生</button>

<hr>

<h3>BGM</h3>
<select id="bgmSelect">
  <option value="bgm1.mp3">BGM1</option>
  <option value="bgm2.mp3">BGM2</option>
  <option value="bgm3.mp3">BGM3</option>
</select>
<button id="toggleBgm">▶ 再生</button>

<div class="volume-box">
  🎤 Voice音量
  <input type="range" id="voiceVolume" min="0" max="1" step="0.01" value="0.8">
</div>

<div class="volume-box">
  🎵 BGM音量
  <input type="range" id="bgmVolume" min="0" max="1" step="0.01" value="0.4">
</div>

<audio id="voicePlayer"></audio>
<audio id="bgmPlayer" loop></audio>

<script>
let voiceData = {};
let history = [];
const MAX_HISTORY = 3;

const voicePlayer = document.getElementById("voicePlayer");
const bgmPlayer = document.getElementById("bgmPlayer");

const characterSelect = document.getElementById("characterSelect");
const bgmSelect = document.getElementById("bgmSelect");
const toggleBgm = document.getElementById("toggleBgm");

voicePlayer.volume = 0.8;
bgmPlayer.volume = 0.4;

// JSON読み込み
fetch("voices.json")
  .then(res => res.json())
  .then(data => {
    voiceData = data;
    initCharacters();
  });

function initCharacters() {
  for (let char in voiceData) {
    let option = document.createElement("option");
    option.value = char;
    option.textContent = char;
    characterSelect.appendChild(option);
  }
}

// レア抽選
function getRandomTier() {
  const rand = Math.random() * 100;
  if (rand < 70) return "N";
  if (rand < 95) return "R";
  return "SR";
}

// ID抽選（直近3回除外）
function getRandomVoice(character) {
  let tier = getRandomTier();
  let list = voiceData[character][tier];

  if (!list || list.length === 0) return null;

  let filtered = list.filter(id => !history.includes(id));

  if (filtered.length === 0) {
    history = [];
    filtered = list;
  }

  const id = filtered[Math.floor(Math.random() * filtered.length)];

  history.push(id);
  if (history.length > MAX_HISTORY) {
    history.shift();
  }

  return { tier, id };
}

document.getElementById("playVoice").addEventListener("click", () => {
  const character = characterSelect.value;
  if (!character) return;

  const result = getRandomVoice(character);
  if (!result) return;

  voicePlayer.src = `voices/${character}/${result.tier}/${result.id}.wav`;
  voicePlayer.play();
});

// BGM制御
toggleBgm.addEventListener("click", () => {
  if (bgmPlayer.paused) {
    bgmPlayer.src = `bgm/${bgmSelect.value}`;
    bgmPlayer.play();
    toggleBgm.textContent = "⏸ 停止";
  } else {
    bgmPlayer.pause();
    toggleBgm.textContent = "▶ 再生";
  }
});

document.getElementById("voiceVolume")
  .addEventListener("input", e => {
    voicePlayer.volume = e.target.value;
  });

document.getElementById("bgmVolume")
  .addEventListener("input", e => {
    bgmPlayer.volume = e.target.value;
  });
</script>

</body>
</html>
