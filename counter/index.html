<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>パネル開放ツール Ultimate</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#f0f0f0;
    font-family:sans-serif;
}

.wrapper{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
    align-items:center;
}

button{
    border:none;
    background:black;
    color:white;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.8;
}

canvas{
    width:100%;
    border:2px solid black;
    background:white;
    touch-action:none;
}

.layerEditor{
    margin-top:20px;
    background:white;
    border-radius:12px;
    padding:15px;
}

#layerPanel{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.layerItem{
    background:#fafafa;
    border:1px solid #ccc;
    border-radius:12px;
    padding:12px;
}

.layerHeader{
    display:flex;
    gap:12px;
    align-items:center;
    margin-bottom:10px;
}

.layerThumb{
    width:70px;
    height:70px;
    object-fit:contain;
    border:1px solid #ccc;
    background:white;
}

textarea{
    width:100%;
    resize:vertical;
    min-height:80px;
    padding:10px;
    font-size:16px;
}

label{
    display:block;
    margin-top:10px;
}

.rangeWrap{
    display:flex;
    align-items:center;
    gap:10px;
}

.info{
    margin-top:10px;
}

@media(max-width:768px){

    .toolbar{
        flex-direction:column;
        align-items:stretch;
    }

    button{
        width:100%;
    }
}

</style>
</head>
<body>

<div class="wrapper">

<h1>パネル開放ツール Ultimate</h1>

<div class="toolbar">

<div>
線画PNG
<input type="file" id="lineUpload" accept="image/png">
</div>

<div>
元画像
<input type="file" id="baseUpload" accept="image/*">
</div>

<label>
パネル色
<input type="color" id="panelColor" value="#ff0000">
</label>

<button id="generateBtn">
パネル生成
</button>

<button id="saveBtn">
PNG保存
</button>

</div>

<canvas id="canvas"></canvas>

<div class="info" id="info">
画像未読み込み
</div>

<div class="layerEditor">

<h2>レイヤー編集</h2>

<div id="layerPanel"></div>

</div>

</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const lineUpload = document.getElementById("lineUpload");
const baseUpload = document.getElementById("baseUpload");

const generateBtn = document.getElementById("generateBtn");
const saveBtn = document.getElementById("saveBtn");

const panelColor = document.getElementById("panelColor");

const layerPanel = document.getElementById("layerPanel");
const info = document.getElementById("info");

let lineImage = null;
let baseImage = null;

let regions = [];

let hitMap = null;

let draggingRegion = null;

let dragOffsetX = 0;
let dragOffsetY = 0;

let renderPending = false;

lineUpload.addEventListener("change", e => {

    const file = e.target.files[0];

    if(!file) return;

    const img = new Image();

    img.onload = () => {

        lineImage = img;

        setupCanvas();

    };

    img.src = URL.createObjectURL(file);
});

baseUpload.addEventListener("change", e => {

    const file = e.target.files[0];

    if(!file) return;

    const img = new Image();

    img.onload = () => {

        baseImage = img;

        setupCanvas();

    };

    img.src = URL.createObjectURL(file);
});

function setupCanvas(){

    const ref = lineImage || baseImage;

    if(!ref) return;

    canvas.width = ref.width;
    canvas.height = ref.height;

    requestRender();
}

generateBtn.addEventListener("click", processPanels);

panelColor.addEventListener("input", requestRender);

saveBtn.addEventListener("click", saveImage);

function processPanels(){

    if(!lineImage){

        alert("線画PNGをアップロードしてください");

        return;
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(lineImage,0,0);

    const imageData = ctx.getImageData(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const binary = createBinaryMap(imageData);

    regions = detectRegions(binary);

    buildLayerUI();

    requestRender();

    info.innerHTML =
        "パネル数 : " + regions.length;
}

function createBinaryMap(imageData){

    const width = imageData.width;
    const height = imageData.height;

    const map = new Uint8Array(width * height);

    for(let i=0;i<width*height;i++){

        const alpha =
            imageData.data[i*4+3];

        map[i] =
            alpha > 10 ? 1 : 0;
    }

    for(let x=0;x<width;x++){

        map[x] = 1;
        map[(height-1)*width+x] = 1;
    }

    for(let y=0;y<height;y++){

        map[y*width] = 1;
        map[y*width+width-1] = 1;
    }

    return {
        data:map,
        width,
        height
    };
}

function detectRegions(binary){

    const data = binary.data;
    const width = binary.width;
    const height = binary.height;

    const visited =
        new Uint8Array(width*height);

    hitMap =
        new Uint16Array(width*height);

    const found = [];

    let regionId = 0;

    for(let y=0;y<height;y++){

        for(let x=0;x<width;x++){

            const idx = y*width+x;

            if(
                data[idx]===0 &&
                !visited[idx]
            ){

                const pixels =
                    floodFill(
                        x,
                        y,
                        data,
                        visited,
                        width,
                        height
                    );

                if(pixels.length > 300){

                    let minX = Infinity;
                    let maxX = -Infinity;
                    let minY = Infinity;
                    let maxY = -Infinity;

                    for(const p of pixels){

                        if(p.x < minX) minX = p.x;
                        if(p.x > maxX) maxX = p.x;
                        if(p.y < minY) minY = p.y;
                        if(p.y > maxY) maxY = p.y;

                        hitMap[
                            p.y*width+p.x
                        ] = regionId+1;
                    }

                    const path =
                        new Path2D();

                    for(const p of pixels){

                        path.rect(
                            p.x,
                            p.y,
                            1,
                            1
                        );
                    }

                    const thumb =
                        createThumbnail(
                            minX,
                            minY,
                            maxX,
                            maxY
                        );

                    found.push({

                        id:regionId,

                        visible:true,

                        pixels,

                        path,

                        thumbnail:thumb,

                        text:"",

                        textColor:"#ffffff",

                        fontSize:48,

                        textX:(minX+maxX)/2,

                        textY:(minY+maxY)/2
                    });

                    regionId++;
                }
            }
        }
    }

    return found;
}

function floodFill(
    startX,
    startY,
    data,
    visited,
    width,
    height
){

    const stack = [[startX,startY]];

    const pixels = [];

    while(stack.length){

        const [x,y] = stack.pop();

        if(
            x<0 ||
            y<0 ||
            x>=width ||
            y>=height
        ){
            continue;
        }

        const idx = y*width+x;

        if(visited[idx]) continue;

        visited[idx] = 1;

        if(data[idx]===1) continue;

        pixels.push({x,y});

        stack.push([x+1,y]);
        stack.push([x-1,y]);
        stack.push([x,y+1]);
        stack.push([x,y-1]);
    }

    return pixels;
}

function createThumbnail(
    minX,
    minY,
    maxX,
    maxY
){

    const size = 70;

    const c =
        document.createElement("canvas");

    c.width = size;
    c.height = size;

    const tctx =
        c.getContext("2d");

    tctx.fillStyle = "#fff";

    tctx.fillRect(0,0,size,size);

    const w = maxX-minX;
    const h = maxY-minY;

    const scale =
        Math.min(size/w,size/h);

    tctx.drawImage(
        lineImage,
        minX,
        minY,
        w,
        h,
        0,
        0,
        w*scale,
        h*scale
    );

    return c.toDataURL();
}

function requestRender(){

    if(renderPending) return;

    renderPending = true;

    requestAnimationFrame(()=>{

        renderPending = false;

        renderAll();

    });
}

function renderAll(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    if(baseImage){

        ctx.drawImage(
            baseImage,
            0,
            0,
            canvas.width,
            canvas.height
        );
    }

    for(const region of regions){

        if(!region.visible) continue;

        ctx.save();

        ctx.fillStyle =
            panelColor.value;

        ctx.fill(region.path);

        ctx.restore();
    }

    for(const region of regions){

        if(!region.visible) continue;

        drawRegionText(region);
    }

    if(lineImage){

        ctx.drawImage(
            lineImage,
            0,
            0
        );
    }
}

function drawRegionText(region){

    ctx.save();

    ctx.clip(region.path);

    ctx.fillStyle =
        region.textColor;

    ctx.font =
        `${region.fontSize}px sans-serif`;

    ctx.textAlign =
        "center";

    ctx.textBaseline =
        "middle";

    const lines =
        region.text.split("\n");

    const lineHeight =
        region.fontSize * 1.2;

    const totalHeight =
        lines.length * lineHeight;

    const startY =
        region.textY -
        totalHeight/2 +
        lineHeight/2;

    lines.forEach((line,index)=>{

        ctx.fillText(
            line,
            region.textX,
            startY + index*lineHeight
        );
    });

    ctx.restore();
}

function buildLayerUI(){

    layerPanel.innerHTML = "";

    for(const region of regions){

        const div =
            document.createElement("div");

        div.className =
            "layerItem";

        const header =
            document.createElement("div");

        header.className =
            "layerHeader";

        const thumb =
            document.createElement("img");

        thumb.src =
            region.thumbnail;

        thumb.className =
            "layerThumb";

        header.appendChild(thumb);

        const title =
            document.createElement("h3");

        title.textContent =
            "パネル " + region.id;

        header.appendChild(title);

        div.appendChild(header);

        const toggle =
            document.createElement("button");

        toggle.textContent =
            region.visible
            ? "表示中"
            : "非表示";

        toggle.addEventListener("click",()=>{

            region.visible =
                !region.visible;

            toggle.textContent =
                region.visible
                ? "表示中"
                : "非表示";

            requestRender();
        });

        div.appendChild(toggle);

        const textLabel =
            document.createElement("label");

        textLabel.textContent =
            "文字";

        div.appendChild(textLabel);

        const textarea =
            document.createElement("textarea");

        textarea.value =
            region.text;

        textarea.addEventListener("input",e=>{

            region.text =
                e.target.value;

            requestRender();
        });

        div.appendChild(textarea);

        const colorLabel =
            document.createElement("label");

        colorLabel.textContent =
            "文字色";

        div.appendChild(colorLabel);

        const colorInput =
            document.createElement("input");

        colorInput.type =
            "color";

        colorInput.value =
            region.textColor;

        colorInput.addEventListener("input",e=>{

            region.textColor =
                e.target.value;

            requestRender();
        });

        div.appendChild(colorInput);

        const sizeLabel =
            document.createElement("label");

        sizeLabel.textContent =
            "文字サイズ";

        div.appendChild(sizeLabel);

        const rangeWrap =
            document.createElement("div");

        rangeWrap.className =
            "rangeWrap";

        const sizeInput =
            document.createElement("input");

        sizeInput.type =
            "range";

        sizeInput.min = 12;
        sizeInput.max = 200;

        sizeInput.value =
            region.fontSize;

        const sizeValue =
            document.createElement("span");

        sizeValue.textContent =
            region.fontSize;

        sizeInput.addEventListener("input",e=>{

            region.fontSize =
                Number(e.target.value);

            sizeValue.textContent =
                region.fontSize;

            requestRender();
        });

        rangeWrap.appendChild(sizeInput);
        rangeWrap.appendChild(sizeValue);

        div.appendChild(rangeWrap);

        const info =
            document.createElement("div");

        info.style.marginTop =
            "10px";

        info.innerHTML =
            "文字をドラッグして移動";

        div.appendChild(info);

        layerPanel.appendChild(div);
    }
}

function getMousePos(e){

    const rect =
        canvas.getBoundingClientRect();

    const scaleX =
        canvas.width / rect.width;

    const scaleY =
        canvas.height / rect.height;

    return {

        x:(e.clientX-rect.left)*scaleX,
        y:(e.clientY-rect.top)*scaleY
    };
}

canvas.addEventListener("pointerdown",e=>{

    const pos =
        getMousePos(e);

    for(let i=regions.length-1;i>=0;i--){

        const region =
            regions[i];

        ctx.font =
            `${region.fontSize}px sans-serif`;

        const lines =
            region.text.split("\n");

        const lineHeight =
            region.fontSize * 1.2;

        let maxWidth = 0;

        for(const line of lines){

            const w =
                ctx.measureText(line).width;

            if(w > maxWidth){

                maxWidth = w;
            }
        }

        const totalHeight =
            lines.length * lineHeight;

        if(
            pos.x >
            region.textX - maxWidth/2 &&
            pos.x <
            region.textX + maxWidth/2 &&
            pos.y >
            region.textY - totalHeight/2 &&
            pos.y <
            region.textY + totalHeight/2
        ){

            draggingRegion =
                region;

            dragOffsetX =
                pos.x - region.textX;

            dragOffsetY =
                pos.y - region.textY;

            return;
        }
    }

    const x =
        Math.floor(pos.x);

    const y =
        Math.floor(pos.y);

    const id =
        hitMap[
            y*canvas.width+x
        ] - 1;

    if(id >= 0){

        regions[id].visible =
            !regions[id].visible;

        updateButtons();

        requestRender();
    }
});

canvas.addEventListener("pointermove",e=>{

    if(!draggingRegion) return;

    const pos =
        getMousePos(e);

    draggingRegion.textX =
        pos.x - dragOffsetX;

    draggingRegion.textY =
        pos.y - dragOffsetY;

    requestRender();
});

canvas.addEventListener("pointerup",()=>{

    draggingRegion = null;
});

canvas.addEventListener("pointerleave",()=>{

    draggingRegion = null;
});

function updateButtons(){

    const buttons =
        layerPanel.querySelectorAll("button");

    regions.forEach((region,index)=>{

        buttons[index].textContent =
            region.visible
            ? "表示中"
            : "非表示";
    });
}

function saveImage(){

    const a =
        document.createElement("a");

    a.href =
        canvas.toDataURL("image/png");

    a.download =
        "panel.png";

    a.click();
}

</script>

</body>
</html>
