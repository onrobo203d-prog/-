<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ギフト耐久管理及び作成ツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root { --card-size: clamp(90px, 10vw, 140px); }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#f6f6f6; }
header { padding: 10px; }

#messageRow {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  margin-bottom:10px;
}

#messageText {
  font-size:13px;
  color:#555;
  font-weight:bold;
  white-space:pre-line;
  line-height:1.0;
}

#noticeBtn {
  font-size:12px;
  padding:6px 10px;
  border-radius:6px;
  border:none;
  background:#444;
  color:#fff;
}

.resetWrap {
  text-align:center;
  margin-bottom:15px;
}

.resetWrap button{
  padding:8px 16px;
  border-radius:8px;
  border:none;
  background:#ff6666;
  color:#fff;
  font-weight:bold;
}

.searchRow { display:flex; gap:8px; }
#search { flex:1; padding:8px; font-size:14px; }
#exportBtn { padding:8px 12px; }

#tabs { display:flex; gap:6px; padding:0 10px; overflow-x:auto; }
#tabs button {
  border:none;
  padding:6px 10px;
  border-radius:6px;
  background:#ddd;
  font-size:13px;
  white-space:nowrap;
}
#tabs button.active { background:#222; color:#fff; }

#grid {
  padding:10px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(var(--card-size),1fr));
  gap:10px;
}

.card {
  background:#fff;
  border-radius:8px;
  padding:6px;
  text-align:center;
  position:relative;
  cursor:pointer;
}

.thumb {
  width:100%;
  aspect-ratio:1/1;
  object-fit:contain;
  border-radius:6px;
}

.name { font-size:12px; }
.point { font-size:11px; color:#666; }

.card.disabled { opacity:0.5; }
.card.disabled::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    45deg,
    transparent 45%,
    rgba(200,0,0,.8) 45%,
    rgba(200,0,0,.8) 55%,
    transparent 55%
  );
  pointer-events:none;
}
</style>
</head>

<body>

<header>

<div id="messageRow">
  <div id="messageText">
    画像をタップすると斜線が入ります<br>
    画像出力は表示されるまで少し時間がかかります
  </div>
  <button id="noticeBtn">使用前にお読み下さい</button>
</div>

<div class="resetWrap">
  <button onclick="resetState()">状態をリセット</button>
</div>

<div class="searchRow">
  <input id="search" placeholder="検索">
  <button id="exportBtn">画像出力</button>
</div>

</header>

<nav id="tabs">
  <button class="active" data-tab="全て">全て</button>
  <button data-tab="ネタ">ネタ</button>
  <button data-tab="笑">笑</button>
  <button data-tab="定番">定番</button>
  <button data-tab="えらい">えらい</button>
  <button data-tab="挨拶">挨拶</button>
  <button data-tab="ステージ">ステージ</button>
  <button data-tab="LOVE">LOVE</button>
</nav>

<main id="grid"></main>

<script>
const DATA_URL = "https://raw.githubusercontent.com/onrobo203d-prog/gifts-image/main/data.json";
const IMG_BASE = "https://raw.githubusercontent.com/onrobo203d-prog/gifts-image/main/images/";
const STORAGE_KEY = "gift_state_v2";
const AUTO_LIMIT = 60 * 60 * 1000; //1時間

let items = [];
let activeTab = "全て";

const grid = document.getElementById("grid");
const search = document.getElementById("search");

/* ===== 保存 ===== */
function saveState(){
  const state = items.map(i=>({
    id:i.id,
    disabled:!!i.disabled
  }));

  const data = {
    updated:Date.now(),
    state:state
  };

  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

/* ===== 復元 ===== */
function restoreState(){
  const saved = localStorage.getItem(STORAGE_KEY);
  if(!saved) return;

  const data = JSON.parse(saved);
  const diff = Date.now() - data.updated;

  const shouldRestore =
    diff < AUTO_LIMIT ||
    confirm("前回の状態を復元しますか？");

  if(!shouldRestore){
    localStorage.removeItem(STORAGE_KEY);
    return;
  }

  const map = new Map(data.state.map(s=>[s.id,s.disabled]));

  items.forEach(item=>{
    if(map.has(item.id)){
      item.disabled = map.get(item.id);
    }
  });
}

/* ===== リセット ===== */
function resetState(){
  if(confirm("本当に状態をリセットしますか？")){
    localStorage.removeItem(STORAGE_KEY);
    items.forEach(i=>i.disabled=false);
    render();
  }
}

/* ===== データ取得 ===== */
fetch(DATA_URL)
  .then(r=>r.json())
  .then(data=>{
    items = data;
    restoreState();
    render();
  });

function normalize(str){
  return str.normalize("NFKC")
    .replace(/[\u30A1-\u30F6]/g,ch=>
      String.fromCharCode(ch.charCodeAt(0)-0x60)
    )
    .toLowerCase();
}

function getFiltered(ignoreSearch=false){
  return items
    .filter(i=>{
      if(!ignoreSearch){
        const keyword = normalize(search.value);
        const target = normalize(i.name);
        if(!target.includes(keyword)) return false;
      }
      if(activeTab==="全て") return true;
      return i.categories.includes(activeTab);
    })
    .sort((a,b)=>(Number(a.points)||0)-(Number(b.points)||0));
}

function createImageElement(id){
  const img=document.createElement("img");
  img.className="thumb";
  img.loading="lazy";
  img.src=IMG_BASE+id+".PNG";
  img.onerror=()=>{
    img.onerror=null;
    img.src=IMG_BASE+id+".png";
  };
  return img;
}

function render(){
  grid.innerHTML="";
  getFiltered().forEach(item=>{
    const c=document.createElement("div");
    c.className="card";
    if(item.disabled) c.classList.add("disabled");

    const img=createImageElement(item.id);

    const name=document.createElement("div");
    name.className="name";
    name.textContent=item.name;

    const point=document.createElement("div");
    point.className="point";
    point.textContent=item.points+"pt";

    c.append(img,name,point);

    c.onclick=()=>{
      item.disabled=!item.disabled;
      c.classList.toggle("disabled");
      saveState();
    };

    grid.appendChild(c);
  });
}

document.querySelectorAll("#tabs button").forEach(b=>{
  b.onclick=()=>{
    document.querySelector("#tabs .active").classList.remove("active");
    b.classList.add("active");
    activeTab=b.dataset.tab;
    render();
  };
});

search.oninput=render;

/* アプリ切替時も保存 */
document.addEventListener("visibilitychange",()=>{
  if(document.hidden) saveState();
});
</script>

</body>
</html>
