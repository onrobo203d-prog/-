<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BGM & 跳ねタイマー</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  padding:env(safe-area-inset-top) 15px env(safe-area-inset-bottom);
}

/* タイトル */
h1{
  font-size:clamp(20px,4vw,32px);
  margin-top:20px;
}

/* 時計 */
#clock{
  font-size:clamp(48px,10vw,110px);
  margin:3vh 0;
  transition:0.3s;
}
.red{ color:red; }

/* BGM全体 */
.bgm-container{
  width:100%;
  max-width:1000px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:40px;
  margin-bottom:30px;
}

/* BGMブロック */
.bgm-block{
  flex:1 1 280px;
  max-width:400px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  padding:15px;
  border-radius:12px;
  background:#1b1b1b;
}

/* 入力とボタン */
input, button{
  padding:10px;
  font-size:clamp(14px,2.5vw,16px);
  width:100%;
  max-width:300px;
  border:none;
  border-radius:8px;
}

button{
  cursor:pointer;
  font-weight:bold;
}

button:active{
  transform:scale(0.96);
}

.ytPlayer{
  width:100%;
  max-width:300px;
  height:60px;
  border:0;
}

/* 下部テキスト */
h5{
  font-size:clamp(12px,2.5vw,16px);
  opacity:0.8;
  margin-bottom:20px;
}

/* スマホ時は縦並び強制 */
@media(max-width:700px){
  .bgm-container{
    flex-direction:column;
    align-items:center;
  }
}
</style>
</head>
<body>

<h1>BGM & 跳ねタイマー</h1>
<div id="clock">--:--:--</div>

<div class="bgm-container">

  <div class="bgm-block" id="normalBGM">
    <h3>通常BGM</h3>
    <button id="normalBtn">再生</button>
    <input type="text" id="normalInput" placeholder="YouTubeリンク">
    <div id="normalPlayer"></div>
  </div>

  <div class="bgm-block" id="zuiBGM">
    <h3>ズイズイBGM</h3>
    <button id="zuiBtn">再生</button>
    <input type="text" id="zuiInput" placeholder="YouTubeリンク">
    <div id="zuiPlayer"></div>
  </div>

</div>

<h5>跳ねるタイミングで時間表示が赤く表示されます。</h5>

<script src="https://www.youtube.com/iframe_api"></script>
<script>

// ===== ローカル保存 =====
const normalInput = document.getElementById("normalInput");
const zuiInput = document.getElementById("zuiInput");

normalInput.value = localStorage.getItem("normalYT") || "";
zuiInput.value = localStorage.getItem("zuiYT") || "";

normalInput.addEventListener("input",e=>localStorage.setItem("normalYT", e.target.value));
zuiInput.addEventListener("input",e=>localStorage.setItem("zuiYT", e.target.value));

// ===== YouTube Player =====
let normalPlayer, zuiPlayer;
let state = "IDLE";

function extractVideoId(url){
  try{
    const u = new URL(url);
    if(u.hostname.includes("youtu.be")) return u.pathname.slice(1);
    return u.searchParams.get("v");
  }catch{
    return null;
  }
}

function createPlayer(containerId, videoId){
  return new YT.Player(containerId,{
    height:'60',
    width:'300',
    videoId:videoId,
    playerVars:{
      autoplay:0,
      loop:1,
      playlist:videoId,
      playsinline:1
    }
  });
}

function toggleBGM(playerVar,inputElem,btnElem,otherPlayerVar,otherBtn,containerId){
  const id = extractVideoId(inputElem.value.trim());
  if(!id){ alert("正しいYouTubeリンクを入力してください"); return; }

  if(otherPlayerVar?.pauseVideo) otherPlayerVar.pauseVideo();
  if(otherBtn) otherBtn.textContent="再生";

  if(state===btnElem.id){
    playerVar?.pauseVideo();
    btnElem.textContent="再生";
    state="IDLE";
    return;
  }

  if(!playerVar){
    playerVar=createPlayer(containerId,id);
    if(btnElem.id==="normalBtn") normalPlayer=playerVar;
    else zuiPlayer=playerVar;
  }else{
    playerVar.seekTo(0);
  }

  playerVar.playVideo();
  btnElem.textContent="停止";
  state=btnElem.id;
}

normalBtn.onclick=()=>toggleBGM(normalPlayer,normalInput,normalBtn,zuiPlayer,zuiBtn,"normalPlayer");
zuiBtn.onclick=()=>toggleBGM(zuiPlayer,zuiInput,zuiBtn,normalPlayer,normalBtn,"zuiPlayer");

// ===== 時計 =====
function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,"0");
  const m=String(now.getMinutes()).padStart(2,"0");
  const s=String(now.getSeconds()).padStart(2,"0");

  const clock=document.getElementById("clock");
  clock.textContent=`${h}:${m}:${s}`;

  if(now.getMinutes()%3===0 && now.getSeconds()===0){
    clock.classList.add("red");
    setTimeout(()=>clock.classList.remove("red"),6000);
  }
}
setInterval(updateClock,1000);
updateClock();

</script>
</body>
</html>
