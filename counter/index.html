<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ギフト管理ツール</title>

<style>
:root { --card-size: clamp(90px, 10vw, 140px); }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#f6f6f6; }
header { padding:10px; }

#messageRow {
  display:flex; justify-content:space-between; align-items:flex-start;
  margin-bottom:10px;
}

#noticeBtn { padding:6px 10px; font-size:12px; }

.resetWrap { text-align:center; margin-bottom:10px; }
.resetWrap button {
  padding:8px 14px;
  background:#ff6666; color:#fff;
  border:none; border-radius:8px;
}

.searchRow { display:flex; gap:8px; margin-bottom:10px; }
#search { flex:1; padding:8px; }

#tabs { display:flex; gap:6px; overflow-x:auto; padding:0 10px; }
#tabs button { padding:6px 10px; border:none; border-radius:6px; background:#ddd; }
#tabs .active { background:#222; color:#fff; }

#grid {
  padding:10px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(var(--card-size),1fr));
  gap:10px;
}

.card {
  background:#fff;
  padding:6px;
  border-radius:8px;
  position:relative;
  cursor:pointer;
}

.thumb {
  width:100%;
  aspect-ratio:1/1;
  object-fit:contain;
}

.card.disabled { opacity:.5; }
.card.disabled::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    45deg,
    transparent 45%,
    rgba(200,0,0,.8) 45%,
    rgba(200,0,0,.8) 55%,
    transparent 55%
  );
}

/* モーダル */
#noticeModal,#preview {
  position:fixed; inset:0;
  background:rgba(0,0,0,.6);
  display:none; align-items:center; justify-content:center;
  z-index:9999;
}
.modalInner {
  background:#fff; padding:20px;
  max-width:90vw; width:320px;
  border-radius:10px;
}
</style>
</head>
<body>

<header>

<div id="messageRow">
  <div style="font-size:13px;">
    画像をタップすると斜線が入ります<br>
    画像出力は少し時間がかかります
  </div>
  <button id="noticeBtn">使用前にお読み下さい</button>
</div>

<div class="resetWrap">
  <button onclick="resetState()">状態をリセット</button>
</div>

<div class="searchRow">
  <input id="search" placeholder="検索">
  <button id="exportBtn">画像出力</button>
</div>

</header>

<nav id="tabs">
  <button class="active" data-tab="全て">全て</button>
</nav>

<main id="grid"></main>

<!-- 注意 -->
<div id="noticeModal">
  <div class="modalInner">
    <h3>ご利用前の注意事項</h3>
    <p>
      本ツールはファン制作の非公式ツールです。<br>
      公式とは無関係です。
    </p>
    <button onclick="closeNotice()">閉じる</button>
  </div>
</div>

<script>
const DATA_URL="https://raw.githubusercontent.com/onrobo203d-prog/gifts-image/main/data.json";
const IMG_BASE="https://raw.githubusercontent.com/onrobo203d-prog/gifts-image/main/images/";
const STORAGE_KEY="gift_state_v3";
const AUTO_LIMIT=60*60*1000;

let items=[];
let activeTab="全て";

const grid=document.getElementById("grid");
const search=document.getElementById("search");

/* 保存 */
function saveState(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify({
    updated:Date.now(),
    state:items.map(i=>({id:i.id,disabled:!!i.disabled}))
  }));
}

/* 復元 */
function restoreState(){
  const saved=localStorage.getItem(STORAGE_KEY);
  if(!saved)return;
  const data=JSON.parse(saved);
  const diff=Date.now()-data.updated;
  if(diff>AUTO_LIMIT&&!confirm("前回の状態を復元しますか？"))return;

  const map=new Map(data.state.map(s=>[s.id,s.disabled]));
  items.forEach(i=>{if(map.has(i.id))i.disabled=map.get(i.id)});
}

/* リセット */
function resetState(){
  if(confirm("本当にリセットしますか？")){
    localStorage.removeItem(STORAGE_KEY);
    items.forEach(i=>i.disabled=false);
    render();
  }
}

/* データ取得 */
fetch(DATA_URL).then(r=>r.json()).then(data=>{
  items=data;
  restoreState();
  render();
});

/* 描画 */
function render(){
  grid.innerHTML="";
  items.forEach(item=>{
    const c=document.createElement("div");
    c.className="card";
    if(item.disabled)c.classList.add("disabled");

    const img=document.createElement("img");
    img.className="thumb";
    img.loading="lazy";
    img.src=IMG_BASE+item.id+".PNG";
    img.onerror=()=>img.src=IMG_BASE+item.id+".png";

    c.appendChild(img);

    c.onclick=()=>{
      item.disabled=!item.disabled;
      c.classList.toggle("disabled");
      saveState();
    };

    grid.appendChild(c);
  });
}

/* 注意 */
document.getElementById("noticeBtn").onclick=()=>{
  document.getElementById("noticeModal").style.display="flex";
};
function closeNotice(){
  document.getElementById("noticeModal").style.display="none";
}

/* ===== 画像出力 ===== */
document.getElementById("exportBtn").onclick=async()=>{
  const enabled=items.filter(i=>!i.disabled);
  if(enabled.length===0)return alert("画像がありません");

  const perPage=100;
  const pages=Math.ceil(enabled.length/perPage);

  for(let p=0;p<pages;p++){
    const slice=enabled.slice(p*perPage,(p+1)*perPage);
    await generatePage(slice,p+1);
  }
};

async function generatePage(list,pageNum){
  const size=200;
  const cols=10;
  const rows=Math.ceil(list.length/cols);

  const canvas=document.createElement("canvas");
  canvas.width=cols*size;
  canvas.height=rows*size;

  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#fff";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<list.length;i++){
    const img=await loadImg(IMG_BASE+list[i].id+".png");
    const x=(i%cols)*size;
    const y=Math.floor(i/cols)*size;
    ctx.drawImage(img,x,y,size,size);
  }

  const link=document.createElement("a");
  link.download="gift_page_"+pageNum+".png";
  link.href=canvas.toDataURL();
  link.click();
}

function loadImg(src){
  return new Promise(res=>{
    const img=new Image();
    img.crossOrigin="anonymous";
    img.onload=()=>res(img);
    img.src=src;
  });
}
</script>
</body>
</html>
