<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Panel Splitter Tool</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:30px;
    background:#f2f2f2;
    font-family:sans-serif;
}

h1{
    margin-top:0;
}

.toolbar{
    display:flex;
    gap:20px;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:20px;
}

button{
    border:none;
    padding:12px 18px;
    cursor:pointer;
    background:black;
    color:white;
    border-radius:8px;
    font-size:16px;
}

input[type="file"]{
    background:white;
    padding:10px;
    border-radius:8px;
}

canvas{
    max-width:100%;
    border:2px solid black;
    background:white;
}

.info{
    margin-top:10px;
    font-size:14px;
}
</style>
</head>
<body>

<h1>Panel Splitter Tool</h1>

<div class="toolbar">

    <input type="file" id="upload" accept="image/*">

    <label>
        Fill Color
        <input type="color" id="colorPicker" value="#ff0000">
    </label>

    <button id="processBtn">
        Process Panels
    </button>

    <button id="downloadBtn">
        Download ZIP
    </button>

</div>

<canvas id="canvas"></canvas>

<div class="info" id="info"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const upload = document.getElementById("upload");
const colorPicker = document.getElementById("colorPicker");

const processBtn = document.getElementById("processBtn");
const downloadBtn = document.getElementById("downloadBtn");

const info = document.getElementById("info");

let originalImage = null;
let regions = [];

upload.addEventListener("change", e => {

    const file = e.target.files[0];
    if(!file) return;

    const img = new Image();

    img.onload = () => {

        originalImage = img;

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img,0,0);

    };

    img.src = URL.createObjectURL(file);

});

processBtn.addEventListener("click", () => {

    if(!originalImage) return;

    processImage();

});

downloadBtn.addEventListener("click", async () => {

    if(regions.length === 0) return;

    await exportZIP();

});

function processImage(){

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(originalImage,0,0);

    const imageData = ctx.getImageData(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const binary = createBinaryMap(imageData);

    autoCloseGaps(binary);

    regions = detectRegions(binary);

    renderRegions();

    info.innerHTML = `
        Regions detected: ${regions.length}
    `;
}

function createBinaryMap(imageData){

    const width = imageData.width;
    const height = imageData.height;

    const binary = new Uint8Array(width * height);

    for(let i=0;i<width*height;i++){

        const r = imageData.data[i*4];
        const g = imageData.data[i*4+1];
        const b = imageData.data[i*4+2];

        const brightness = (r+g+b)/3;

        binary[i] = brightness < 40 ? 1 : 0;
    }

    for(let x=0;x<width;x++){

        binary[x] = 1;
        binary[(height-1)*width+x] = 1;
    }

    for(let y=0;y<height;y++){

        binary[y*width] = 1;
        binary[y*width+(width-1)] = 1;
    }

    return {
        data:binary,
        width,
        height
    };
}

function autoCloseGaps(binaryObj){

    const data = binaryObj.data;
    const width = binaryObj.width;
    const height = binaryObj.height;

    for(let y=1;y<height-1;y++){

        for(let x=1;x<width-1;x++){

            const idx = y*width+x;

            if(data[idx] === 0){

                let walls = 0;

                for(let dy=-1;dy<=1;dy++){

                    for(let dx=-1;dx<=1;dx++){

                        const ni = (y+dy)*width+(x+dx);

                        if(data[ni] === 1){
                            walls++;
                        }
                    }
                }

                if(walls >= 7){
                    data[idx] = 1;
                }
            }
        }
    }
}

function detectRegions(binaryObj){

    const data = binaryObj.data;
    const width = binaryObj.width;
    const height = binaryObj.height;

    const visited = new Uint8Array(width*height);

    const regions = [];

    let regionId = 0;

    for(let y=0;y<height;y++){

        for(let x=0;x<width;x++){

            const idx = y*width+x;

            if(data[idx] === 0 && !visited[idx]){

                const region = floodFill(
                    x,
                    y,
                    data,
                    visited,
                    width,
                    height
                );

                if(region.length > 100){

                    regions.push({
                        id:regionId++,
                        pixels:region
                    });
                }
            }
        }
    }

    return regions;
}

function floodFill(
    startX,
    startY,
    data,
    visited,
    width,
    height
){

    const stack = [[startX,startY]];
    const pixels = [];

    while(stack.length){

        const [x,y] = stack.pop();

        if(
            x < 0 ||
            y < 0 ||
            x >= width ||
            y >= height
        ){
            continue;
        }

        const idx = y*width+x;

        if(visited[idx]) continue;

        visited[idx] = 1;

        if(data[idx] === 1) continue;

        pixels.push({x,y});

        stack.push([x+1,y]);
        stack.push([x-1,y]);
        stack.push([x,y+1]);
        stack.push([x,y-1]);
    }

    return pixels;
}

function renderRegions(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const fillColor = colorPicker.value;

    for(const region of regions){

        ctx.fillStyle = fillColor;

        for(const p of region.pixels){

            ctx.fillRect(
                p.x,
                p.y,
                1,
                1
            );
        }
    }

    ctx.drawImage(originalImage,0,0);
}

colorPicker.addEventListener("input", () => {

    if(regions.length > 0){
        renderRegions();
    }

});

async function exportZIP(){

    const zip = new JSZip();

    for(const region of regions){

        const off = document.createElement("canvas");

        off.width = canvas.width;
        off.height = canvas.height;

        const offCtx = off.getContext("2d");

        offCtx.clearRect(0,0,off.width,off.height);

        offCtx.fillStyle = colorPicker.value;

        for(const p of region.pixels){

            offCtx.fillRect(
                p.x,
                p.y,
                1,
                1
            );
        }

        offCtx.drawImage(originalImage,0,0);

        const blob = await new Promise(resolve => {
            off.toBlob(resolve,"image/png");
        });

        zip.file(
            `panel_${region.id}.png`,
            blob
        );
    }

    const content = await zip.generateAsync({
        type:"blob"
    });

    const a = document.createElement("a");

    a.href = URL.createObjectURL(content);

    a.download = "panels.zip";

    a.click();
}

</script>

</body>
</html>
