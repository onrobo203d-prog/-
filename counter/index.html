<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>パネル開放ツール 完全版</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#f0f0f0;
    font-family:sans-serif;
}

.wrapper{
    padding:20px;
    max-width:1000px;
    margin:auto;
}

.toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:15px;
    align-items:center;
}

button{
    border:none;
    background:black;
    color:white;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.8;
}

canvas{
    border:2px solid black;
    background:white;
    width:100%;
    height:auto;
    max-width:100%;
    touch-action:none;
    image-rendering:auto;
}

.info{
    margin-top:10px;
}

.layerEditor{
    margin-top:20px;
    background:white;
    padding:15px;
    border-radius:12px;
}

#layerPanel{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.layerItem{
    border:1px solid #ccc;
    padding:12px;
    border-radius:10px;
    background:#fafafa;
}

.layerItem h3{
    margin-top:0;
    font-size:16px;
}

.layerItem input[type="text"]{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    font-size:16px;
}

.layerItem label{
    display:block;
    margin-top:10px;
    font-size:14px;
}

.layerItem input[type="range"]{
    width:100%;
}

@media (max-width:768px){

    .toolbar{
        flex-direction:column;
        align-items:stretch;
    }

    button{
        width:100%;
    }

    .layerItem{
        padding:15px;
    }

    .layerItem input[type="text"]{
        font-size:16px;
    }
}

</style>
</head>
<body>

<div class="wrapper">

<h1>パネル開放ツール</h1>

<div class="toolbar">

<div>
線画PNG
<input type="file" id="lineUpload" accept="image/png">
</div>

<div>
元画像
<input type="file" id="baseUpload" accept="image/*">
</div>

<label>
パネル色
<input type="color" id="panelColor" value="#ff0000">
</label>

<button id="generateBtn">
パネル生成
</button>

<button id="saveBtn">
現在状態を保存
</button>

</div>

<canvas id="canvas"></canvas>

<div class="info" id="info">
画像未読み込み
</div>

<div class="layerEditor">

<h2>レイヤー編集</h2>

<div id="layerPanel"></div>

</div>

</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const lineUpload = document.getElementById("lineUpload");
const baseUpload = document.getElementById("baseUpload");

const generateBtn = document.getElementById("generateBtn");
const saveBtn = document.getElementById("saveBtn");

const panelColor = document.getElementById("panelColor");

const layerPanel = document.getElementById("layerPanel");
const info = document.getElementById("info");

let lineImage = null;
let baseImage = null;

let regions = [];

lineUpload.addEventListener("change", e => {

    const file = e.target.files[0];

    if(!file) return;

    const img = new Image();

    img.onload = () => {

        lineImage = img;

        setupCanvas();

    };

    img.src = URL.createObjectURL(file);

});

baseUpload.addEventListener("change", e => {

    const file = e.target.files[0];

    if(!file) return;

    const img = new Image();

    img.onload = () => {

        baseImage = img;

        setupCanvas();

    };

    img.src = URL.createObjectURL(file);

});

function setupCanvas(){

    if(!lineImage && !baseImage) return;

    const ref = lineImage || baseImage;

    canvas.width = ref.width;
    canvas.height = ref.height;

    renderAll();

}

generateBtn.addEventListener("click", processPanels);

panelColor.addEventListener("input", () => {

    renderAll();

});

saveBtn.addEventListener("click", saveCurrentImage);

canvas.addEventListener("click", onCanvasClick);

function processPanels(){

    if(!lineImage){

        alert("線画PNGをアップロードしてください");

        return;
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(lineImage,0,0);

    const imageData = ctx.getImageData(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const binary = createBinaryMap(imageData);

    closeSmallGaps(binary);

    regions = detectRegions(binary);

    buildLayerUI();

    renderAll();

    info.innerHTML =
        "パネル数 : " + regions.length;
}

function createBinaryMap(imageData){

    const width = imageData.width;
    const height = imageData.height;

    const map = new Uint8Array(width * height);

    for(let i=0;i<width*height;i++){

        const alpha = imageData.data[i*4 + 3];

        if(alpha > 10){
            map[i] = 1;
        }else{
            map[i] = 0;
        }
    }

    for(let x=0;x<width;x++){

        map[x] = 1;
        map[(height-1)*width+x] = 1;
    }

    for(let y=0;y<height;y++){

        map[y*width] = 1;
        map[y*width + width - 1] = 1;
    }

    return {
        data:map,
        width,
        height
    };
}

function closeSmallGaps(binary){

    const data = binary.data;
    const width = binary.width;
    const height = binary.height;

    const copy = new Uint8Array(data);

    for(let y=1;y<height-1;y++){

        for(let x=1;x<width-1;x++){

            const idx = y*width+x;

            if(copy[idx] === 0){

                let walls = 0;

                for(let dy=-1;dy<=1;dy++){

                    for(let dx=-1;dx<=1;dx++){

                        const ni =
                            (y+dy)*width + (x+dx);

                        if(copy[ni] === 1){
                            walls++;
                        }
                    }
                }

                if(walls >= 7){
                    data[idx] = 1;
                }
            }
        }
    }
}

function detectRegions(binary){

    const data = binary.data;
    const width = binary.width;
    const height = binary.height;

    const visited = new Uint8Array(width*height);

    const found = [];

    let regionId = 0;

    for(let y=0;y<height;y++){

        for(let x=0;x<width;x++){

            const idx = y*width+x;

            if(
                data[idx] === 0 &&
                !visited[idx]
            ){

                const region = floodFill(
                    x,
                    y,
                    data,
                    visited,
                    width,
                    height
                );

                if(region.length > 300){

                    let minX = Infinity;
                    let maxX = -Infinity;
                    let minY = Infinity;
                    let maxY = -Infinity;

                    for(const p of region){

                        if(p.x < minX) minX = p.x;
                        if(p.x > maxX) maxX = p.x;
                        if(p.y < minY) minY = p.y;
                        if(p.y > maxY) maxY = p.y;
                    }

                    found.push({

                        id:regionId++,

                        pixels:region,

                        visible:true,

                        text:"",

                        textColor:"#ffffff",

                        fontSize:48,

                        centerX:(minX + maxX)/2,

                        centerY:(minY + maxY)/2
                    });
                }
            }
        }
    }

    return found;
}

function floodFill(
    startX,
    startY,
    data,
    visited,
    width,
    height
){

    const stack = [[startX,startY]];

    const pixels = [];

    while(stack.length){

        const [x,y] = stack.pop();

        if(
            x < 0 ||
            y < 0 ||
            x >= width ||
            y >= height
        ){
            continue;
        }

        const idx = y*width+x;

        if(visited[idx]) continue;

        visited[idx] = 1;

        if(data[idx] === 1) continue;

        pixels.push({x,y});

        stack.push([x+1,y]);
        stack.push([x-1,y]);
        stack.push([x,y+1]);
        stack.push([x,y-1]);
    }

    return pixels;
}

function renderAll(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    if(baseImage){

        ctx.drawImage(
            baseImage,
            0,
            0,
            canvas.width,
            canvas.height
        );
    }

    for(const region of regions){

        if(!region.visible) continue;

        ctx.fillStyle =
            panelColor.value;

        for(const p of region.pixels){

            ctx.fillRect(
                p.x,
                p.y,
                1,
                1
            );
        }

        ctx.fillStyle =
            region.textColor;

        ctx.font =
            `${region.fontSize}px sans-serif`;

        ctx.textAlign = "center";

        ctx.textBaseline = "middle";

        ctx.fillText(
            region.text,
            region.centerX,
            region.centerY
        );
    }

    if(lineImage){

        ctx.drawImage(
            lineImage,
            0,
            0,
            canvas.width,
            canvas.height
        );
    }
}

function buildLayerUI(){

    layerPanel.innerHTML = "";

    for(const region of regions){

        const div =
            document.createElement("div");

        div.className = "layerItem";

        const title =
            document.createElement("h3");

        title.textContent =
            "パネル " + region.id;

        div.appendChild(title);

        const toggle =
            document.createElement("button");

        toggle.textContent =
            region.visible
            ? "表示中"
            : "非表示";

        toggle.addEventListener("click", () => {

            region.visible =
                !region.visible;

            toggle.textContent =
                region.visible
                ? "表示中"
                : "非表示";

            renderAll();

        });

        div.appendChild(toggle);

        const textLabel =
            document.createElement("label");

        textLabel.textContent =
            "文字";

        div.appendChild(textLabel);

        const textInput =
            document.createElement("input");

        textInput.type = "text";

        textInput.value =
            region.text;

        textInput.addEventListener("input", e => {

            region.text =
                e.target.value;

            renderAll();

        });

        div.appendChild(textInput);

        const colorLabel =
            document.createElement("label");

        colorLabel.textContent =
            "文字色";

        div.appendChild(colorLabel);

        const colorInput =
            document.createElement("input");

        colorInput.type = "color";

        colorInput.value =
            region.textColor;

        colorInput.addEventListener("input", e => {

            region.textColor =
                e.target.value;

            renderAll();

        });

        div.appendChild(colorInput);

        const sizeLabel =
            document.createElement("label");

        sizeLabel.textContent =
            "文字サイズ";

        div.appendChild(sizeLabel);

        const sizeInput =
            document.createElement("input");

        sizeInput.type = "range";

        sizeInput.min = 12;
        sizeInput.max = 200;

        sizeInput.value =
            region.fontSize;

        sizeInput.addEventListener("input", e => {

            region.fontSize =
                Number(e.target.value);

            renderAll();

        });

        div.appendChild(sizeInput);

        layerPanel.appendChild(div);
    }
}

function onCanvasClick(e){

    const rect =
        canvas.getBoundingClientRect();

    const scaleX =
        canvas.width / rect.width;

    const scaleY =
        canvas.height / rect.height;

    const x =
        Math.floor(
            (e.clientX - rect.left)
            * scaleX
        );

    const y =
        Math.floor(
            (e.clientY - rect.top)
            * scaleY
        );

    /*
    上から順に判定
    */

    for(let i = regions.length - 1; i >= 0; i--){

        const region = regions[i];

        for(const p of region.pixels){

            if(
                p.x === x &&
                p.y === y
            ){

                /*
                表示⇔非表示切替
                */

                region.visible =
                    !region.visible;

                updateLayerButtons();

                renderAll();

                return;
            }
        }
    }
}

function updateLayerButtons(){

    const buttons =
        layerPanel.querySelectorAll("button");

    regions.forEach((region,index) => {

        buttons[index].textContent =
            region.visible
            ? "表示中"
            : "非表示";

    });
}

function saveCurrentImage(){

    const a =
        document.createElement("a");

    a.href =
        canvas.toDataURL("image/png");

    a.download =
        "panel_state.png";

    a.click();
}

</script>

</body>
</html>
