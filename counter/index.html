<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BGM & 跳ねタイマー</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
  height:100vh;
  overflow:hidden; /* ← スクロール禁止 */
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
}

/* タイトル */
h1{
  margin:10px 0 0 0;
  font-size:clamp(16px,3vw,28px);
  text-align:center;
}

/* 時計 */
#clock{
  font-size:clamp(36px,8vw,90px);
  text-align:center;
  transition:0.3s;
}
.red{ color:red; }

/* メイン横並び */
.main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px;
}

/* BGMブロック */
.bgm-block{
  flex:1;
  max-width:350px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  padding:15px;
  border-radius:12px;
  background:#1b1b1b;
}

/* 入力＆ボタン */
input, button{
  width:100%;
  padding:8px;
  font-size:clamp(12px,2vw,15px);
  border:none;
  border-radius:6px;
}

button{
  font-weight:bold;
  cursor:pointer;
}

button:active{
  transform:scale(0.95);
}

/* プレイヤー */
.ytPlayer{
  width:100%;
  height:60px;
}

/* 下部説明 */
h5{
  text-align:center;
  font-size:clamp(11px,2vw,14px);
  margin:5px 0;
  opacity:0.7;
}
</style>
</head>
<body>

<h1>BGM & 跳ねタイマー</h1>

<div id="clock">--:--:--</div>

<div class="main">

  <div class="bgm-block">
    <h3>通常BGM</h3>
    <button id="normalBtn">再生</button>
    <input type="text" id="normalInput" placeholder="YouTubeリンク">
    <div id="normalPlayer"></div>
  </div>

  <div class="bgm-block">
    <h3>ズイズイBGM</h3>
    <button id="zuiBtn">再生</button>
    <input type="text" id="zuiInput" placeholder="YouTubeリンク">
    <div id="zuiPlayer"></div>
  </div>

</div>

<h5>跳ねるタイミングで時間表示が赤く表示されます。</h5>

<script src="https://www.youtube.com/iframe_api"></script>
<script>

// ===== ローカル保存 =====
const normalInput=document.getElementById("normalInput");
const zuiInput=document.getElementById("zuiInput");

normalInput.value=localStorage.getItem("normalYT")||"";
zuiInput.value=localStorage.getItem("zuiYT")||"";

normalInput.oninput=e=>localStorage.setItem("normalYT",e.target.value);
zuiInput.oninput=e=>localStorage.setItem("zuiYT",e.target.value);

// ===== YouTube =====
let normalPlayer,zuiPlayer;
let state="IDLE";

function extractVideoId(url){
  try{
    const u=new URL(url);
    if(u.hostname.includes("youtu.be")) return u.pathname.slice(1);
    return u.searchParams.get("v");
  }catch{return null;}
}

function createPlayer(id,videoId){
  return new YT.Player(id,{
    height:'60',
    width:'300',
    videoId:videoId,
    playerVars:{loop:1,playlist:videoId,playsinline:1}
  });
}

function toggle(player,input,btn,other,otherBtn,id){
  const vid=extractVideoId(input.value.trim());
  if(!vid){alert("正しいYouTubeリンクを入力してください");return;}

  other?.pauseVideo();
  if(otherBtn) otherBtn.textContent="再生";

  if(state===btn.id){
    player?.pauseVideo();
    btn.textContent="再生";
    state="IDLE";
    return;
  }

  if(!player){
    player=createPlayer(id,vid);
    if(btn.id==="normalBtn") normalPlayer=player;
    else zuiPlayer=player;
  }else{
    player.seekTo(0);
  }

  player.playVideo();
  btn.textContent="停止";
  state=btn.id;
}

normalBtn.onclick=()=>toggle(normalPlayer,normalInput,normalBtn,zuiPlayer,zuiBtn,"normalPlayer");
zuiBtn.onclick=()=>toggle(zuiPlayer,zuiInput,zuiBtn,normalPlayer,normalBtn,"zuiPlayer");

// ===== 時計 =====
function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,"0");
  const m=String(now.getMinutes()).padStart(2,"0");
  const s=String(now.getSeconds()).padStart(2,"0");

  const clock=document.getElementById("clock");
  clock.textContent=`${h}:${m}:${s}`;

  if(now.getMinutes()%3===0 && now.getSeconds()===0){
    clock.classList.add("red");
    setTimeout(()=>clock.classList.remove("red"),6000);
  }
}
setInterval(updateClock,1000);
updateClock();

</script>
</body>
</html>
