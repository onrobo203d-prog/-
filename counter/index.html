<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGM & 跳ねタイマー</title>
<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
}
#clock{
  font-size:clamp(40px,8vw,72px);
  margin:30px 0;
  transition:0.3s;
}
.red{ color:red; }

.bgm-block{
  margin-bottom:30px;
}

.controls-row{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-bottom:5px;
}

input,button{
  padding:10px;
  font-size:16px;
}

iframe{
  border:0;
}

/* プレーヤー小さく表示 */
.ytPlayer{
  width:200px;
  height:50px;
}
</style>
</head>
<body>

<h1>BGM & 跳ねタイマー</h1>
<div id="clock">--:--:--</div>

<div class="bgm-block" id="normalBGM">
  <h3>通常BGM</h3>
  <div class="controls-row">
    <button class="playBtn" id="normalBtn">再生</button>
    <input type="text" class="ytUrl" id="normalInput" placeholder="YouTubeリンク">
  </div>
  <iframe class="ytPlayer" id="normalPlayer"></iframe>
</div>

<div class="bgm-block" id="zuiBGM">
  <h3>ズイズイBGM</h3>
  <div class="controls-row">
    <button class="playBtn" id="zuiBtn">再生</button>
    <input type="text" class="ytUrl" id="zuiInput" placeholder="YouTubeリンク">
  </div>
  <iframe class="ytPlayer" id="zuiPlayer"></iframe>
</div>

<h5>跳ねるタイミングで時間表示が赤く表示されます。</h5>

<script>
// ===== ローカル保存読み込み =====
const normalInput = document.getElementById("normalInput");
const zuiInput = document.getElementById("zuiInput");

normalInput.value = localStorage.getItem("normalYT") || "";
zuiInput.value = localStorage.getItem("zuiYT") || "";

// 入力変更で即保存
normalInput.addEventListener("input",e=>localStorage.setItem("normalYT",e.target.value));
zuiInput.addEventListener("input",e=>localStorage.setItem("zuiYT",e.target.value));

// ===== YouTube動画ID取得 =====
function extractVideoId(url){
  try{
    const u = new URL(url);
    if(u.hostname.includes("youtu.be")) return u.pathname.slice(1);
    return u.searchParams.get("v");
  }catch{
    return null;
  }
}

// ===== プレーヤー＆状態管理 =====
const normalPlayer = document.getElementById("normalPlayer");
const zuiPlayer = document.getElementById("zuiPlayer");

let state="IDLE";

// ===== 再生関数 =====
function playBGM(player,url,btn,otherPlayer,otherBtn){
  const id = extractVideoId(url.trim());
  if(!id){ alert("正しいYouTubeリンクを入力してください"); return; }

  // もう片方停止
  otherPlayer.src="";
  otherBtn.textContent="再生";

  // 自分が再生中なら停止
  if(state === btn.id){
    player.src="";
    btn.textContent="再生";
    state="IDLE";
    return;
  }

  // 再生
  player.src=`https://www.youtube.com/embed/${id}?autoplay=1&loop=1&playlist=${id}&playsinline=1`;
  btn.textContent="停止";
  state=btn.id;
}

// ===== ボタンイベント =====
document.getElementById("normalBtn").addEventListener("click",()=>{
  playBGM(normalPlayer, normalInput.value, normalBtn, zuiPlayer, zuiBtn);
});
document.getElementById("zuiBtn").addEventListener("click",()=>{
  playBGM(zuiPlayer, zuiInput.value, zuiBtn, normalPlayer, normalBtn);
});

// ===== 時計 =====
function updateClock(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2,"0");
  const m = String(now.getMinutes()).padStart(2,"0");
  const s = String(now.getSeconds()).padStart(2,"0");

  const clock = document.getElementById("clock");
  clock.textContent=`${h}:${m}:${s}`;

  if(now.getMinutes()%3===0 && now.getSeconds()===0){
    clock.classList.add("red");
    setTimeout(()=>clock.classList.remove("red"),6000);
  }
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
