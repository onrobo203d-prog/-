<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>パネル開けツール</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,
body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#111;
    color:white;
    font-family:
    "Noto Sans JP",
    sans-serif;
}

body{
    display:flex;
    flex-direction:column;
}

button,
input,
textarea{
    font:inherit;
}

#topbar{

    min-height:64px;

    display:flex;
    align-items:center;
    gap:10px;

    padding:10px;

    background:#1a1a1a;

    border-bottom:
    1px solid #333;

    flex-shrink:0;

    flex-wrap:wrap;
}

.fileBtn,
button{

    border:none;

    background:#333;

    color:white;

    padding:12px 16px;

    border-radius:14px;

    font-size:15px;

    cursor:pointer;
}

button:active,
.fileBtn:active{
    transform:scale(0.98);
}

input[type=file]{
    display:none;
}

#canvasWrap{

    position:relative;

    width:100%;

    background:#000;

    overflow:hidden;

    touch-action:none;

    flex-shrink:0;
}

canvas{

    width:100%;
    height:100%;

    display:block;

    touch-action:none;

    background:#000;
}

#layersPanel{

    flex:1;

    overflow:auto;

    background:#181818;

    border-top:
    1px solid #333;

    padding:10px;

    min-height:0;
}

.layerCard{

    background:#242424;

    border-radius:18px;

    padding:10px;

    margin-bottom:12px;
}

.layerHeader{

    display:flex;

    align-items:center;

    gap:10px;
}

.layerHeader button{
    flex-shrink:0;
}

.thumb{

    width:64px;
    height:64px;

    object-fit:contain;

    background:white;

    border-radius:10px;

    flex-shrink:0;
}

.layerTitle{

    font-size:14px;

    word-break:break-all;
}

.layerControls{

    margin-top:10px;

    display:flex;

    flex-direction:column;

    gap:10px;
}

textarea{

    width:100%;

    min-height:80px;

    border:none;

    border-radius:12px;

    padding:10px;

    resize:none;

    background:#333;

    color:white;
}

.row{

    display:flex;

    align-items:center;

    gap:10px;
}

.color{

    width:50px;
    height:40px;

    padding:0;

    border:none;

    background:none;
}

.activeLayer{

    outline:
    3px solid #4da3ff;
}

</style>
</head>
<body>

<div id="topbar">

<label class="fileBtn">

背景

<input
type="file"
id="bgUpload"
accept="image/*">

</label>

<label class="fileBtn">

ZIP

<input
type="file"
id="zipUpload"
accept=".zip">

</label>

<button id="workSaveBtn">
作業セーブ
</button>

<button id="saveBtn">
画像DL
</button>

<button id="clearBtn">
データ削除
</button>

</div>

<div id="canvasWrap">
<canvas id="canvas"></canvas>
</div>

<div id="layersPanel"></div>

<script>

const DB_NAME =
"panel_editor_db";

const STORE_NAME =
"autosave";

const SAVE_KEY =
"project";

let db = null;

async function initDB(){

    return new Promise((resolve,reject)=>{

        const request =
        indexedDB.open(
            DB_NAME,
            1
        );

        request.onupgradeneeded =
        e => {

            const db =
            e.target.result;

            if(
                !db.objectStoreNames.contains(
                    STORE_NAME
                )
            ){

                db.createObjectStore(
                    STORE_NAME
                );
            }
        };

        request.onsuccess =
        e => {

            db =
            e.target.result;

            resolve();
        };

        request.onerror =
        reject;
    });
}

async function saveToDB(data){

    return new Promise((resolve,reject)=>{

        const tx =
        db.transaction(
            STORE_NAME,
            "readwrite"
        );

        const store =
        tx.objectStore(
            STORE_NAME
        );

        store.put(
            data,
            SAVE_KEY
        );

        tx.oncomplete =
        resolve;

        tx.onerror =
        reject;
    });
}

async function loadFromDB(){

    return new Promise((resolve,reject)=>{

        const tx =
        db.transaction(
            STORE_NAME,
            "readonly"
        );

        const store =
        tx.objectStore(
            STORE_NAME
        );

        const req =
        store.get(
            SAVE_KEY
        );

        req.onsuccess =
        ()=>resolve(req.result);

        req.onerror =
        reject;
    });
}

async function clearSavedData(){

    return new Promise((resolve,reject)=>{

        const tx =
        db.transaction(
            STORE_NAME,
            "readwrite"
        );

        const store =
        tx.objectStore(
            STORE_NAME
        );

        store.delete(
            SAVE_KEY
        );

        tx.oncomplete =
        resolve;

        tx.onerror =
        reject;
    });
}

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const bgUpload =
document.getElementById("bgUpload");

const zipUpload =
document.getElementById("zipUpload");

const layersPanel =
document.getElementById("layersPanel");

const saveBtn =
document.getElementById("saveBtn");

const workSaveBtn =
document.getElementById("workSaveBtn");

const clearBtn =
document.getElementById("clearBtn");

const canvasWrap =
document.getElementById("canvasWrap");

const DPR =
Math.min(
    window.devicePixelRatio || 1,
    2
);

let bgImage = null;

let bgFit = null;

let layers = [];

let activeLayer = null;

let pointers = new Map();

let dragging = false;

let pinchStartDistance = 0;

let pinchStartScale = 1;

let rotateStartAngle = 0;

let rotateStartRotation = 0;

let renderPending = false;

function requestRender(){

    if(renderPending)
        return;

    renderPending = true;

    requestAnimationFrame(()=>{

        renderPending = false;

        render();
    });
}

function blobToURL(blob){

    return URL.createObjectURL(blob);
}

async function blobToDataURL(blob){

    return new Promise(resolve=>{

        const reader =
        new FileReader();

        reader.onload =
        ()=>resolve(reader.result);

        reader.readAsDataURL(blob);
    });
}

function imageFromSrc(src){

    return new Promise(resolve=>{

        const img =
        new Image();

        img.onload =
        ()=>resolve(img);

        img.src = src;
    });
}

async function dataURLToImage(dataURL){

    return await imageFromSrc(dataURL);
}

function cleanupLayers(){

    for(
        const layer of layers
    ){

        if(
            layer.image &&
            layer.image.src.startsWith(
                "blob:"
            )
        ){

            URL.revokeObjectURL(
                layer.image.src
            );
        }

        if(
            layer.thumbnail &&
            layer.thumbnail.startsWith(
                "blob:"
            )
        ){

            URL.revokeObjectURL(
                layer.thumbnail
            );
        }
    }

    layers = [];

    layersPanel.innerHTML = "";

    activeLayer = null;
}

async function autoSave(){

    const saveData = {

        bgImage:null,

        layers:[]
    };

    if(bgImage){

        const bgCanvas =
        document.createElement("canvas");

        bgCanvas.width =
        bgImage.width;

        bgCanvas.height =
        bgImage.height;

        bgCanvas
        .getContext("2d")
        .drawImage(
            bgImage,
            0,
            0
        );

        const bgBlob =
        await new Promise(r=>
            bgCanvas.toBlob(r)
        );

        saveData.bgImage =
        await blobToDataURL(bgBlob);
    }

    for(const layer of layers){

        const layerCanvas =
        document.createElement("canvas");

        layerCanvas.width =
        layer.image.width;

        layerCanvas.height =
        layer.image.height;

        layerCanvas
        .getContext("2d")
        .drawImage(
            layer.image,
            0,
            0
        );

        const layerBlob =
        await new Promise(r=>
            layerCanvas.toBlob(r)
        );

        saveData.layers.push({

            name:
            layer.name,

            image:
            await blobToDataURL(
                layerBlob
            ),

            visible:
            layer.visible,

            text:
            layer.text,

            color:
            layer.color,

            stroke:
            layer.stroke,

            x:
            layer.x,

            y:
            layer.y,

            scale:
            layer.scale,

            rotation:
            layer.rotation,

            baseSize:
            layer.baseSize
        });
    }

    await saveToDB(saveData);
}

async function restoreAutoSave(){

    const data =
    await loadFromDB();

    if(!data)
        return;

    const ok =
    confirm(
        "前回の作業データを復元しますか？"
    );

    if(!ok)
        return;

    cleanupLayers();

    if(data.bgImage){

        bgImage =
        await dataURLToImage(
            data.bgImage
        );

        adjustCanvasArea();

        resizeCanvas();
    }

    for(const saved of data.layers){

        const img =
        await dataURLToImage(
            saved.image
        );

        const thumbCanvas =
        document.createElement(
            "canvas"
        );

        thumbCanvas.width = 64;
        thumbCanvas.height = 64;

        const tctx =
        thumbCanvas.getContext(
            "2d"
        );

        const scale =
        Math.min(
            64 / img.width,
            64 / img.height
        );

        const w =
        img.width * scale;

        const h =
        img.height * scale;

        const x =
        (64 - w) / 2;

        const y =
        (64 - h) / 2;

        tctx.drawImage(
            img,
            x,
            y,
            w,
            h
        );

        const thumbBlob =
        await new Promise(r=>
            thumbCanvas.toBlob(r)
        );

        const thumbURL =
        blobToURL(
            thumbBlob
        );

        const layer = {

            ...saved,

            image:img,

            thumbnail:thumbURL
        };

        layers.push(layer);

        createLayerUI(layer);
    }

    requestRender();
}

/* 以下は元コードそのまま */

function adjustCanvasArea(){

    const screenW =
    window.innerWidth;

    const screenH =
    window.innerHeight;

    const topbarH =
    document
    .getElementById("topbar")
    .offsetHeight;

    const layersMin =
    260;

    const usableH =
    screenH -
    topbarH -
    layersMin;

    let canvasH =
    usableH;

    if(bgImage){

        const ratio =
        bgImage.height /
        bgImage.width;

        canvasH =
        screenW * ratio;
    }

    canvasWrap.style.height =
    `${Math.min(
        usableH,
        canvasH
    )}px`;
}

function resizeCanvas(){

    const rect =
    canvasWrap
    .getBoundingClientRect();

    canvas.width =
    rect.width * DPR;

    canvas.height =
    rect.height * DPR;

    ctx.setTransform(
        DPR,
        0,
        0,
        DPR,
        0,
        0
    );

    requestRender();
}

window.addEventListener(
    "resize",
    ()=>{

        adjustCanvasArea();

        resizeCanvas();
    }
);

adjustCanvasArea();
resizeCanvas();

bgUpload.addEventListener(
    "change",
    async e=>{

    const file =
    e.target.files[0];

    if(!file)
        return;

    const src =
    blobToURL(file);

    bgImage =
    await imageFromSrc(src);

    adjustCanvasArea();

    resizeCanvas();
});

zipUpload.addEventListener(
    "change",
    async e=>{

    const file =
    e.target.files[0];

    if(!file)
        return;

    cleanupLayers();

    const zip =
    await JSZip.loadAsync(
        file
    );

    const entries =
    Object.values(zip.files)
    .filter(f=>
        f.name.endsWith(
            ".png"
        )
    );

    for(
        const entry of entries
    ){

        const blob =
        await entry.async(
            "blob"
        );

        const src =
        blobToURL(blob);

        const img =
        await imageFromSrc(src);

        const thumbCanvas =
        document.createElement(
            "canvas"
        );

        thumbCanvas.width = 64;
        thumbCanvas.height = 64;

        const tctx =
        thumbCanvas.getContext(
            "2d"
        );

        const scale =
        Math.min(
            64 / img.width,
            64 / img.height
        );

        const w =
        img.width * scale;

        const h =
        img.height * scale;

        const x =
        (64 - w) / 2;

        const y =
        (64 - h) / 2;

        tctx.drawImage(
            img,
            x,
            y,
            w,
            h
        );

        const thumbBlob =
        await new Promise(resolve=>
            thumbCanvas.toBlob(
                resolve
            )
        );

        const thumbURL =
        blobToURL(
            thumbBlob
        );

        const layer = {

            name:
            entry.name,

            image:
            img,

            thumbnail:
            thumbURL,

            visible:true,

            text:"",

            color:"#ffffff",

            stroke:"#000000",

            x:100,
            y:100,

            scale:1,

            rotation:0,

            baseSize:48
        };

        layers.push(layer);

        createLayerUI(layer);
    }

    requestRender();
});

/* 中略（createLayerUI/renderなど元コードそのまま） */

/* ボタン処理 */

workSaveBtn.onclick =
async ()=>{

    await autoSave();

    alert(
        "作業データを保存しました"
    );
};

saveBtn.onclick =
saveImage;

clearBtn.onclick =
async ()=>{

    const ok =
    confirm(
        "保存データを削除しますか？"
    );

    if(!ok)
        return;

    await clearSavedData();

    alert(
        "削除しました"
    );
};

(async()=>{

    await initDB();

    await restoreAutoSave();

})();

</script>
</body>
</html>
