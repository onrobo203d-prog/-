<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGM & 跳ねタイマー</title>
<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
}
#clock{
  font-size:clamp(40px,8vw,72px);
  margin:20px 0;
  transition:0.3s;
}
.red{ color:red; }

.bgm-container{
  display:flex;
  justify-content:center;
  gap:40px;
  margin-bottom:30px;
}

.bgm-block{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

input, button{
  padding:8px 12px;
  font-size:14px;
  width:200px;
}

.ytPlayer{
  width:200px;
  height:50px;
  border:0;
}
</style>
</head>
<body>

<h1>BGM & 跳ねタイマー</h1>
<div id="clock">--:--:--</div>

<div class="bgm-container">

  <div class="bgm-block" id="normalBGM">
    <h3>通常BGM</h3>
    <button id="normalBtn">再生</button>
    <input type="text" id="normalInput" placeholder="YouTubeリンク">
    <div id="normalPlayer"></div>
  </div>

  <div class="bgm-block" id="zuiBGM">
    <h3>ズイズイBGM</h3>
    <button id="zuiBtn">再生</button>
    <input type="text" id="zuiInput" placeholder="YouTubeリンク">
    <div id="zuiPlayer"></div>
  </div>

</div>

<h5>跳ねるタイミングで時間表示が赤く表示されます。</h5>

<!-- YouTube Iframe API -->
<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ===== ローカル保存 =====
const normalInput = document.getElementById("normalInput");
const zuiInput = document.getElementById("zuiInput");

normalInput.value = localStorage.getItem("normalYT") || "";
zuiInput.value = localStorage.getItem("zuiYT") || "";

normalInput.addEventListener("input",e=>localStorage.setItem("normalYT", e.target.value));
zuiInput.addEventListener("input",e=>localStorage.setItem("zuiYT", e.target.value));

// ===== YouTube Player API =====
let normalPlayer, zuiPlayer;
let state = "IDLE";

// 動画ID取得
function extractVideoId(url){
  try{
    const u = new URL(url);
    if(u.hostname.includes("youtu.be")) return u.pathname.slice(1);
    return u.searchParams.get("v");
  }catch{
    return null;
  }
}

// プレイヤー作成
function createPlayer(containerId, videoId){
  return new YT.Player(containerId, {
    height:'50',
    width:'200',
    videoId: videoId,
    playerVars: {
      autoplay:0,
      loop:1,
      playlist: videoId,
      playsinline:1
    }
  });
}

// 再生/停止共通関数
function toggleBGM(playerVar, inputElem, btnElem, otherPlayerVar, otherBtn, playerContainer){
  const id = extractVideoId(inputElem.value.trim());
  if(!id){ alert("正しいYouTubeリンクを入力してください"); return; }

  // 他方停止（バッファ残す）
  if(otherPlayerVar && otherPlayerVar.pauseVideo) otherPlayerVar.pauseVideo();
  if(otherBtn) otherBtn.textContent="再生";

  // 自分が再生中なら停止
  if(state === btnElem.id){
    if(playerVar && playerVar.pauseVideo) playerVar.pauseVideo();
    btnElem.textContent="再生";
    state="IDLE";
    return;
  }

  // プレイヤー未作成または動画が変わった場合は作り直す
  if(!playerVar){
    playerVar = createPlayer(playerContainer, id);
    if(btnElem.id === "normalBtn") normalPlayer = playerVar;
    else zuiPlayer = playerVar;
  } else {
    playerVar.seekTo(0); // 頭から再生
  }

  playerVar.playVideo();
  btnElem.textContent="停止";
  state = btnElem.id;
}

// ボタンイベント
document.getElementById("normalBtn").addEventListener("click",()=>{
  toggleBGM(normalPlayer, normalInput, normalBtn, zuiPlayer, zuiBtn, "normalPlayer");
});
document.getElementById("zuiBtn").addEventListener("click",()=>{
  toggleBGM(zuiPlayer, zuiInput, zuiBtn, normalPlayer, normalBtn, "zuiPlayer");
});

// ===== 時計 =====
function updateClock(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2,"0");
  const m = String(now.getMinutes()).padStart(2,"0");
  const s = String(now.getSeconds()).padStart(2,"0");

  const clock = document.getElementById("clock");
  clock.textContent=`${h}:${m}:${s}`;

  if(now.getMinutes()%3===0 && now.getSeconds()===0){
    clock.classList.add("red");
    setTimeout(()=>clock.classList.remove("red"),6000);
  }
}
setInterval(updateClock,1000);
updateClock();
</script>
</body>
</html>
