<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGM & 跳ねタイマー</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

#clock{
  font-size:clamp(40px,8vw,72px);
  margin:30px 0;
  transition:0.3s;
}

.red{ color:red; }

.controls{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

select,button,input{
  padding:10px;
  font-size:16px;
  min-width:220px;
}

.minute-list h6{
  margin:0; 
  line-height:1.1; 
}
</style>
</head>
<body>

<h1>BGM & 跳ねタイマー</h1>
<div id="clock">--:--:--</div>

<div class="minute-list">
  <h6>00、03、06、09、12、15、18、21、24、27</h6>
  <h6>30、33、36、39、42、45、48、51、54、57</h6>
</div>
  
<div class="controls">

  <h3>通常BGM</h3>
  <select id="normalSelect"></select>
  <input type="text" id="ytInput" placeholder="YouTubeリンクを貼る（優先再生）">
  <button id="normalBtn" disabled>再生</button>

  <h3>ズイズイBGM</h3>
  <select id="zuiSelect"></select>
  <button id="zuiBtn" disabled>再生</button>

</div>

<h5>登録されているBGMは全てフリー音源として使用できます。</h5>
<h5>跳ねるタイミングで時間表示が赤く表示されます。</h5>

<script>

// =====================
// Audio
// =====================
const normalAudio = new Audio();
normalAudio.loop = true;

const zuiAudio = new Audio();

let ytPlayer = null;
let isYouTube = false;

let state = "IDLE";
let redTimeout = null;

normalAudio.volume = 1;
zuiAudio.volume = 1;

// =====================
// YouTube処理
// =====================
function extractVideoId(url){
  if(url.includes("watch?v=")){
    return url.split("watch?v=")[1].split("&")[0];
  }
  if(url.includes("youtu.be/")){
    return url.split("youtu.be/")[1].split("?")[0];
  }
  return null;
}

// =====================
// JSON読み込み
// =====================
fetch("bgm.json")
.then(res => res.json())
.then(data => {

  populateSelect("normalSelect", data.normal, "BGM");
  populateSelect("zuiSelect", data.zui, "zuizui");

  document.getElementById("normalBtn").disabled = false;
  document.getElementById("zuiBtn").disabled = false;

})
.catch(err=>{
  alert("bgm.json読み込み失敗");
  console.error(err);
});

function populateSelect(selectId, list, folder){
  const select = document.getElementById(selectId);
  select.innerHTML = "";

  list.forEach(file=>{
    const option = document.createElement("option");

    option.value = folder + "/" + encodeURIComponent(file);
    const displayName = file.replace(/\.[^/.]+$/, "");
    option.textContent = displayName;

    select.appendChild(option);
  });
}

// =====================
// 通常BGM（YouTube対応）
// =====================
document.getElementById("normalBtn").addEventListener("click",()=>{

  const btn = document.getElementById("normalBtn");

  if(state === "NORMAL"){
    stopNormal();
    state = "IDLE";
    btn.textContent = "再生";
    return;
  }

  if(state !== "IDLE") return;

  stopZui();

  const ytUrl = document.getElementById("ytInput").value.trim();

  // ===== YouTube優先 =====
  if(ytUrl){
    const videoId = extractVideoId(ytUrl);
    if(!videoId){
      alert("正しいYouTubeリンクを入力してください");
      return;
    }

    stopNormal();

    const embedUrl =
      `https://www.youtube.com/embed/${videoId}?autoplay=1&loop=1&playlist=${videoId}`;

    if(!ytPlayer){
      ytPlayer = document.createElement("iframe");
      ytPlayer.style.display = "none";
      ytPlayer.allow = "autoplay";
      document.body.appendChild(ytPlayer);
    }

    ytPlayer.src = embedUrl;

    isYouTube = true;
    state = "NORMAL";
    btn.textContent = "停止";
    return;
  }

  // ===== 通常mp3 =====
  const src = document.getElementById("normalSelect").value;
  if(!src) return;

  normalAudio.src = src;
  normalAudio.currentTime = 0;
  normalAudio.play();

  isYouTube = false;
  state = "NORMAL";
  btn.textContent = "停止";
});

function stopNormal(){

  if(isYouTube && ytPlayer){
    ytPlayer.src = "";
  }

  normalAudio.pause();
  normalAudio.currentTime = 0;
  document.getElementById("normalBtn").textContent = "再生";
}

// =====================
// ズイズイBGM
// =====================
document.getElementById("zuiBtn").addEventListener("click",()=>{

  const btn = document.getElementById("zuiBtn");

  if(state === "ZUI"){
    stopZui();
    state = "IDLE";
    btn.textContent = "再生";
    return;
  }

  if(state !== "IDLE" && state !== "NORMAL") return;

  stopNormal();

  const src = document.getElementById("zuiSelect").value;
  if(!src) return;

  zuiAudio.src = src;
  zuiAudio.currentTime = 0;
  zuiAudio.play();

  state = "ZUI";
  btn.textContent = "停止";
});

function stopZui(){
  zuiAudio.pause();
  zuiAudio.currentTime = 0;
  document.getElementById("zuiBtn").textContent = "再生";
}

// =====================
// 時計
// =====================
function updateClock(){

  const now = new Date();
  const h = String(now.getHours()).padStart(2,"0");
  const m = String(now.getMinutes()).padStart(2,"0");
  const s = String(now.getSeconds()).padStart(2,"0");

  const clock = document.getElementById("clock");
  clock.textContent = `${h}:${m}:${s}`;

  if(now.getMinutes() % 3 === 0 && now.getSeconds() === 0){

    clock.classList.add("red");

    if(redTimeout) clearTimeout(redTimeout);
    redTimeout = setTimeout(()=>{
      clock.classList.remove("red");
    },6000);
  }
}

setInterval(updateClock,1000);
updateClock();

</script>
</body>
</html>
