<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGM & 跳ねタイマー</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

#clock{
  font-size:clamp(40px,8vw,72px);
  margin:30px 0;
  transition:0.3s;
}

.red{ color:red; }

.controls{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

input,button{
  padding:10px;
  font-size:16px;
  min-width:260px;
}

.minute-list h6{
  margin:0; 
  line-height:1.1; 
}
</style>
</head>
<body>

<h1>BGM & 跳ねタイマー</h1>
<div id="clock">--:--:--</div>

<div class="minute-list">
  <h6>00、03、06、09、12、15、18、21、24、27</h6>
  <h6>30、33、36、39、42、45、48、51、54、57</h6>
</div>
  
<div class="controls">

  <h3>通常BGM（YouTube）</h3>
  <input type="text" id="normalInput" placeholder="YouTubeリンクを貼る">
  <button id="normalBtn">再生</button>

  <h3>ズイズイBGM（YouTube）</h3>
  <input type="text" id="zuiInput" placeholder="YouTubeリンクを貼る">
  <button id="zuiBtn">再生</button>

</div>

<h5>跳ねるタイミングで時間表示が赤く表示されます。</h5>

<script>

// =====================
// 初期ロード（ローカル保存読込）
// =====================

document.getElementById("normalInput").value =
  localStorage.getItem("normalYT") || "";

document.getElementById("zuiInput").value =
  localStorage.getItem("zuiYT") || "";

// 入力したら即保存
document.getElementById("normalInput").addEventListener("input",(e)=>{
  localStorage.setItem("normalYT", e.target.value);
});

document.getElementById("zuiInput").addEventListener("input",(e)=>{
  localStorage.setItem("zuiYT", e.target.value);
});

// =====================
// YouTube関連
// =====================

let normalPlayer = null;
let zuiPlayer = null;

let state = "IDLE";
let redTimeout = null;

function extractVideoId(url){
  if(url.includes("watch?v=")){
    return url.split("watch?v=")[1].split("&")[0];
  }
  if(url.includes("youtu.be/")){
    return url.split("youtu.be/")[1].split("?")[0];
  }
  return null;
}

function createPlayer(){
  const iframe = document.createElement("iframe");
  iframe.style.display = "none";
  iframe.allow = "autoplay";
  document.body.appendChild(iframe);
  return iframe;
}

function stopNormal(){
  if(normalPlayer){
    normalPlayer.src = "";
  }
  document.getElementById("normalBtn").textContent = "再生";
}

function stopZui(){
  if(zuiPlayer){
    zuiPlayer.src = "";
  }
  document.getElementById("zuiBtn").textContent = "再生";
}

// =====================
// 通常BGM
// =====================

document.getElementById("normalBtn").addEventListener("click",()=>{

  const btn = document.getElementById("normalBtn");

  if(state === "NORMAL"){
    stopNormal();
    state = "IDLE";
    return;
  }

  const url = document.getElementById("normalInput").value.trim();
  const videoId = extractVideoId(url);

  if(!videoId){
    alert("正しいYouTubeリンクを入力してください");
    return;
  }

  stopZui();

  if(!normalPlayer){
    normalPlayer = createPlayer();
  }

  normalPlayer.src =
    `https://www.youtube.com/embed/${videoId}?autoplay=1&loop=1&playlist=${videoId}`;

  state = "NORMAL";
  btn.textContent = "停止";
});

// =====================
// ズイズイBGM
// =====================

document.getElementById("zuiBtn").addEventListener("click",()=>{

  const btn = document.getElementById("zuiBtn");

  if(state === "ZUI"){
    stopZui();
    state = "IDLE";
    return;
  }

  const url = document.getElementById("zuiInput").value.trim();
  const videoId = extractVideoId(url);

  if(!videoId){
    alert("正しいYouTubeリンクを入力してください");
    return;
  }

  stopNormal();

  if(!zuiPlayer){
    zuiPlayer = createPlayer();
  }

  zuiPlayer.src =
    `https://www.youtube.com/embed/${videoId}?autoplay=1&loop=1&playlist=${videoId}`;

  state = "ZUI";
  btn.textContent = "停止";
});

// =====================
// 時計
// =====================

function updateClock(){

  const now = new Date();
  const h = String(now.getHours()).padStart(2,"0");
  const m = String(now.getMinutes()).padStart(2,"0");
  const s = String(now.getSeconds()).padStart(2,"0");

  const clock = document.getElementById("clock");
  clock.textContent = `${h}:${m}:${s}`;

  if(now.getMinutes() % 3 === 0 && now.getSeconds() === 0){

    clock.classList.add("red");

    if(redTimeout) clearTimeout(redTimeout);
    redTimeout = setTimeout(()=>{
      clock.classList.remove("red");
    },6000);
  }
}

setInterval(updateClock,1000);
updateClock();

</script>
</body>
</html>
