<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>パネルレイヤーエディタ</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    background:#111;
    color:white;
    font-family:"Noto Sans JP",sans-serif;
    overflow:hidden;
}

#topbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:20;

    display:flex;
    gap:10px;
    padding:10px;
    background:#1b1b1b;
    border-bottom:1px solid #333;
}

button,
input,
textarea{
    font:inherit;
}

button{
    border:none;
    background:#333;
    color:white;
    border-radius:12px;
    padding:10px 14px;
}

button:active{
    transform:scale(0.98);
}

input[type=file]{
    display:none;
}

.fileBtn{
    border:none;
    background:#444;
    color:white;
    border-radius:12px;
    padding:10px 14px;
}

#canvasWrap{
    position:fixed;
    top:60px;
    left:0;
    right:0;
    bottom:300px;
    overflow:hidden;
    background:#222;
    touch-action:none;
}

canvas{
    width:100%;
    height:100%;
    display:block;
    touch-action:none;
}

#layersPanel{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    height:300px;
    overflow:auto;
    background:#181818;
    border-top:1px solid #333;
    padding:10px;
}

.layerCard{
    background:#242424;
    border-radius:14px;
    padding:10px;
    margin-bottom:10px;
}

.layerHeader{
    display:flex;
    align-items:center;
    gap:10px;
}

.thumb{
    width:64px;
    height:64px;
    object-fit:contain;
    background:white;
    border-radius:8px;
}

.layerControls{
    margin-top:10px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

textarea{
    width:100%;
    min-height:70px;
    resize:none;
    border:none;
    border-radius:10px;
    padding:10px;
    background:#333;
    color:white;
}

.row{
    display:flex;
    align-items:center;
    gap:10px;
}

.color{
    width:50px;
    height:40px;
    padding:0;
    border:none;
}

#helpBtn{
    position:fixed;
    right:14px;
    bottom:320px;
    z-index:30;

    width:54px;
    height:54px;
    border-radius:50%;
    background:#ff4d4d;
    font-size:24px;
}

#helpPopup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    z-index:100;
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
}

#helpContent{
    background:#222;
    border-radius:20px;
    max-width:500px;
    width:100%;
    padding:20px;
    line-height:1.8;
}

#helpContent h2{
    margin-top:0;
}

.activeLayer{
    outline:3px solid #4da3ff;
}

</style>
</head>
<body>

<div id="topbar">

<label class="fileBtn">
背景
<input type="file" id="bgUpload" accept="image/*">
</label>

<label class="fileBtn">
ZIP
<input type="file" id="zipUpload" accept=".zip">
</label>

<button id="saveBtn">保存</button>

</div>

<div id="canvasWrap">
<canvas id="canvas"></canvas>
</div>

<div id="layersPanel"></div>

<button id="helpBtn">？</button>

<div id="helpPopup">
<div id="helpContent">

<h2>操作説明</h2>

<h3>スマホ</h3>

<p>
1本指ドラッグ → 移動<br>
2本指ピンチ → サイズ変更<br>
2本指回転 → 回転
</p>

<h3>PC</h3>

<p>
ドラッグ → 移動<br>
ホイール → サイズ変更<br>
Alt + ホイール → 回転
</p>

<button id="closeHelp">閉じる</button>

</div>
</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const bgUpload = document.getElementById("bgUpload");
const zipUpload = document.getElementById("zipUpload");
const layersPanel = document.getElementById("layersPanel");

const helpBtn = document.getElementById("helpBtn");
const helpPopup = document.getElementById("helpPopup");
const closeHelp = document.getElementById("closeHelp");

const saveBtn = document.getElementById("saveBtn");

let bgImage = null;
let layers = [];

let activeLayer = null;

let dragging = false;

let pointers = new Map();

let pinchStartDistance = 0;
let pinchStartScale = 1;

let rotateStartAngle = 0;
let rotateStartRotation = 0;

const DPR = window.devicePixelRatio || 1;

resizeCanvas();

window.addEventListener("resize", resizeCanvas);

function resizeCanvas(){

    const rect =
        canvas.parentElement.getBoundingClientRect();

    canvas.width = rect.width * DPR;
    canvas.height = rect.height * DPR;

    ctx.setTransform(DPR,0,0,DPR,0,0);

    render();
}

bgUpload.addEventListener("change", async e => {

    const file = e.target.files[0];
    if(!file) return;

    const img = new Image();

    img.onload = () => {

        bgImage = img;
        render();
    };

    img.src = URL.createObjectURL(file);
});

zipUpload.addEventListener("change", async e => {

    const file = e.target.files[0];
    if(!file) return;

    layers = [];
    layersPanel.innerHTML = "";

    const zip = await JSZip.loadAsync(file);

    const entries =
        Object.values(zip.files)
        .filter(f => f.name.endsWith(".png"));

    for(const entry of entries){

        const blob =
            await entry.async("blob");

        const url =
            URL.createObjectURL(blob);

        const img = new Image();

        await new Promise(resolve => {

            img.onload = resolve;
            img.src = url;
        });

        const thumbCanvas =
            document.createElement("canvas");

        thumbCanvas.width = 64;
        thumbCanvas.height = 64;

        const tctx =
            thumbCanvas.getContext("2d");

        tctx.drawImage(
            img,
            0,
            0,
            64,
            64
        );

        const layer = {

            name:entry.name,

            image:img,

            visible:true,

            text:"",

            color:"#ffffff",

            stroke:"#000000",

            x:200,

            y:200,

            scale:1,

            rotation:0,

            baseSize:48,

            thumbnail:
                thumbCanvas.toDataURL()
        };

        layers.push(layer);

        createLayerUI(layer);
    }

    render();
});

function createLayerUI(layer){

    const card =
        document.createElement("div");

    card.className = "layerCard";

    const header =
        document.createElement("div");

    header.className = "layerHeader";

    const visible =
        document.createElement("input");

    visible.type = "checkbox";
    visible.checked = true;

    visible.oninput = () => {

        layer.visible = visible.checked;
        render();
    };

    const thumb =
        document.createElement("img");

    thumb.className = "thumb";
    thumb.src = layer.thumbnail;

    const title =
        document.createElement("div");

    title.textContent = layer.name;

    header.appendChild(visible);
    header.appendChild(thumb);
    header.appendChild(title);

    const controls =
        document.createElement("div");

    controls.className = "layerControls";

    const textarea =
        document.createElement("textarea");

    textarea.placeholder =
        "文字入力";

    textarea.oninput = () => {

        layer.text = textarea.value;
        render();
    };

    const row =
        document.createElement("div");

    row.className = "row";

    const color =
        document.createElement("input");

    color.type = "color";
    color.className = "color";

    color.value = "#ffffff";

    color.oninput = () => {

        layer.color = color.value;
        render();
    };

    const stroke =
        document.createElement("input");

    stroke.type = "color";
    stroke.className = "color";

    stroke.value = "#000000";

    stroke.oninput = () => {

        layer.stroke = stroke.value;
        render();
    };

    row.appendChild(color);
    row.appendChild(stroke);

    controls.appendChild(textarea);
    controls.appendChild(row);

    card.appendChild(header);
    card.appendChild(controls);

    card.addEventListener("click", () => {

        document
            .querySelectorAll(".layerCard")
            .forEach(v =>
                v.classList.remove(
                    "activeLayer"
                )
            );

        card.classList.add("activeLayer");

        activeLayer = layer;

        render();
    });

    layersPanel.appendChild(card);
}

function render(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    if(bgImage){

        fitDraw(bgImage);
    }

    for(const layer of layers){

        if(!layer.visible) continue;

        ctx.drawImage(
            layer.image,
            0,
            0,
            canvas.width / DPR,
            canvas.height / DPR
        );

        drawLayerText(layer);
    }
}

function fitDraw(img){

    const cw = canvas.width / DPR;
    const ch = canvas.height / DPR;

    const scale = Math.min(
        cw / img.width,
        ch / img.height
    );

    const w = img.width * scale;
    const h = img.height * scale;

    const x = (cw - w)/2;
    const y = (ch - h)/2;

    ctx.drawImage(img,x,y,w,h);
}

function drawLayerText(layer){

    if(!layer.text) return;

    ctx.save();

    ctx.translate(layer.x,layer.y);

    ctx.rotate(layer.rotation);

    const size =
        layer.baseSize * layer.scale;

    ctx.font =
        `${size}px sans-serif`;

    ctx.textBaseline = "top";

    ctx.lineWidth =
        Math.max(2,size*0.08);

    ctx.fillStyle = layer.color;
    ctx.strokeStyle = layer.stroke;

    const lines =
        layer.text.split("\n");

    lines.forEach((line,i)=>{

        const yy = i * size * 1.2;

        ctx.strokeText(line,0,yy);
        ctx.fillText(line,0,yy);
    });

    if(layer === activeLayer){

        const width =
            Math.max(
                ...lines.map(
                    l =>
                        ctx.measureText(l).width
                )
            );

        const height =
            lines.length *
            size *
            1.2;

        ctx.strokeStyle = "#4da3ff";

        ctx.strokeRect(
            -10,
            -10,
            width+20,
            height+20
        );
    }

    ctx.restore();
}

canvas.addEventListener(
    "pointerdown",
    e => {

        canvas.setPointerCapture(
            e.pointerId
        );

        pointers.set(
            e.pointerId,
            {
                x:e.clientX,
                y:e.clientY
            }
        );

        if(activeLayer){

            dragging = true;
        }

        if(pointers.size === 2){

            const arr =
                [...pointers.values()];

            pinchStartDistance =
                distance(arr[0],arr[1]);

            pinchStartScale =
                activeLayer?.scale || 1;

            rotateStartAngle =
                angle(arr[0],arr[1]);

            rotateStartRotation =
                activeLayer?.rotation || 0;
        }
    }
);

canvas.addEventListener(
    "pointermove",
    e => {

        if(!activeLayer) return;

        if(!pointers.has(e.pointerId))
            return;

        const prev =
            pointers.get(e.pointerId);

        pointers.set(
            e.pointerId,
            {
                x:e.clientX,
                y:e.clientY
            }
        );

        if(pointers.size === 1 && dragging){

            const dx =
                e.clientX - prev.x;

            const dy =
                e.clientY - prev.y;

            activeLayer.x += dx;
            activeLayer.y += dy;

            render();
        }

        if(pointers.size === 2){

            const arr =
                [...pointers.values()];

            const dist =
                distance(arr[0],arr[1]);

            activeLayer.scale =
                pinchStartScale *
                (dist / pinchStartDistance);

            const ang =
                angle(arr[0],arr[1]);

            activeLayer.rotation =
                rotateStartRotation +
                (ang - rotateStartAngle);

            render();
        }
    }
);

canvas.addEventListener(
    "pointerup",
    e => {

        pointers.delete(e.pointerId);

        dragging = false;
    }
);

canvas.addEventListener(
    "wheel",
    e => {

        e.preventDefault();

        if(!activeLayer) return;

        if(e.altKey){

            activeLayer.rotation +=
                e.deltaY * 0.005;

        }else{

            activeLayer.scale -=
                e.deltaY * 0.001;

            activeLayer.scale =
                Math.max(
                    0.2,
                    Math.min(
                        10,
                        activeLayer.scale
                    )
                );
        }

        render();

    },
    { passive:false }
);

function distance(a,b){

    return Math.hypot(
        b.x-a.x,
        b.y-a.y
    );
}

function angle(a,b){

    return Math.atan2(
        b.y-a.y,
        b.x-a.x
    );
}

saveBtn.addEventListener("click", saveImage);

function saveImage(){

    canvas.toBlob(blob => {

        const url =
            URL.createObjectURL(blob);

        const a =
            document.createElement("a");

        a.href = url;
        a.download = "panel_edit.png";

        a.click();

        setTimeout(() => {

            URL.revokeObjectURL(url);

        },1000);

    },"image/png");
}

helpBtn.onclick = () => {

    helpPopup.style.display = "flex";
};

closeHelp.onclick = () => {

    helpPopup.style.display = "none";
};

helpPopup.onclick = e => {

    if(e.target === helpPopup){

        helpPopup.style.display = "none";
    }
};

</script>
</body>
</html>
